        // Személyes köszöntés + névnap
        (function(){
            const name=localStorage.getItem('nu_name');
            if(!name) return;
            document.getElementById('greeting').textContent='Szia, '+name+'! ✨';

            // Névnap ellenőrzés
            const d=msgDay();
            const key=(d.getMonth()+1).toString().padStart(2,'0')+'-'+d.getDate().toString().padStart(2,'0');
            const todayNames=NEVNAPOK[key]||[];
            const nameNorm=name.trim();
            const isNameDay=todayNames.some(n=>n.toLowerCase()===nameNorm.toLowerCase());
            if(isNameDay){
                document.getElementById('greeting').textContent='Boldog névnapot, '+name+'! 🎉';
                const evtEl=document.getElementById('phEvent');
                if(!evtEl.textContent) evtEl.textContent='🎉 Ma van a névnapod! Boldog névnapot, '+name+'! 🥳';
            }
        })();

        // Streak
        (function(){const t=td(),l=localStorage.getItem('nu_l');let s=parseInt(localStorage.getItem('nu_s')||'0');if(l!==t){const y=msgDay();y.setDate(y.getDate()-1);s=l===y.toDateString()?s+1:1;localStorage.setItem('nu_l',t);localStorage.setItem('nu_s',s.toString())}if(s>1){document.getElementById('streak').classList.add('on');document.getElementById('sn').textContent=s}})();

        function seen(){return localStorage.getItem('nu_d')===td()}
        function mark(){localStorage.setItem('nu_d',td())}

        // Hang effekt (iOS-en is működik, vibrate nem)
        let audioCtx=null;
        function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}
        function tickSound(){
            if(!audioCtx)return;
            const o=audioCtx.createOscillator(),g=audioCtx.createGain();
            o.connect(g);g.connect(audioCtx.destination);
            o.frequency.value=800+Math.random()*400;
            g.gain.value=0.03;
            g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.04);
            o.start();o.stop(audioCtx.currentTime+0.04);
        }
        function doneSound(){
            if(!audioCtx)return;
            [0,80,160].forEach((delay,i)=>{
                setTimeout(()=>{
                    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
                    o.connect(g);g.connect(audioCtx.destination);
                    o.frequency.value=[900,1100,1400][i];
                    g.gain.value=0.05;
                    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.1);
                    o.start();o.stop(audioCtx.currentTime+0.1);
                },delay);
            });
        }

        // Gépelő effekt hanggal
        function typeText(el,text,cb){
            el.innerHTML='';
            let i=0;
            const cursor=document.createElement('span');
            cursor.className='cursor';
            el.appendChild(cursor);

            function tick(){
                if(i<text.length){
                    el.insertBefore(document.createTextNode(text[i]),cursor);
                    if(i%2===0){tickSound()}
                    i++;
                    setTimeout(tick, 30 + Math.random()*25);
                } else {
                    doneSound();
                    setTimeout(()=>{cursor.remove();if(cb)cb()},500);
                }
            }
            tick();
        }

        // Reakció az üzenet hangulata alapján
        function pickReaction(m){
            const t=m.t.toLowerCase();
            if(m.e==='😂'||m.e==='😁'||m.e==='🐧'||m.e==='🍕'||m.e==='🐱'||m.e==='💃'||m.e==='🎬'||m.e==='😄'||t.includes('nevess')||t.includes('tánc')||t.includes('vicces')) return 'dancing';
            if(m.e==='💧'||m.e==='🧸'||m.e==='🤗'||m.e==='🫂'||m.e==='🩹'||t.includes('szomorú')||t.includes('sírni')||t.includes('ölelés')||t.includes('egyedül')||t.includes('fájdal')) return 'caring';
            if(m.e==='🔎'||m.e==='🧐'||m.e==='💡'||m.e==='🔮'||m.e==='🧭'||t.includes('gondolj')||t.includes('kérdezd')||t.includes('tanulj')) return 'thinking';
            if(m.e==='⚡'||m.e==='🚀'||m.e==='🔥'||m.e==='💪'||m.e==='🏆'||m.e==='💯'||t.includes('csináld')||t.includes('ugorj')||t.includes('add bele')) return 'excited';
            return 'happy';
        }

        let lastMsg=null;

        // ========== KEDVENCEK ==========
        function getFavs(){try{return JSON.parse(localStorage.getItem('nu_favs')||'[]')}catch(e){return[]}}
        function saveFavs(f){localStorage.setItem('nu_favs',JSON.stringify(f))}
        function isFaved(m){return getFavs().some(f=>f.t===m.t)}
        function updateFavsUI(){
            const favs=getFavs();
            const toggle=document.getElementById('favsToggle');
            const badge=document.getElementById('favsBadge');
            if(favs.length>0){toggle.classList.add('has');badge.textContent=favs.length}
            else{toggle.classList.remove('has')}
        }
        function updateFavBtn(){
            const fb=document.getElementById('favBtn');
            if(!lastMsg)return;
            if(isFaved(lastMsg)){fb.textContent='❤️ Kedvenc';fb.classList.add('saved')}
            else{fb.textContent='🤍 Kedvenc';fb.classList.remove('saved')}
        }
        function renderFavsList(){
            const list=document.getElementById('favsList');
            const favs=getFavs();
            if(favs.length===0){list.innerHTML='<div class="favs-empty">Még nincs kedvenc üzeneted.<br>Koppints a 🤍 gombra!</div>';return}
            list.innerHTML=favs.map((f,i)=>`<div class="fav-item"><span class="fav-item-emoji">${f.e}</span><div><div class="fav-item-text">${f.t}</div><div class="fav-item-date">${f.d||''}</div></div><button class="fav-item-del" data-i="${i}">✕</button></div>`).join('');
            list.querySelectorAll('.fav-item-del').forEach(b=>b.addEventListener('click',function(){
                const favs=getFavs();favs.splice(parseInt(this.dataset.i),1);saveFavs(favs);
                renderFavsList();updateFavsUI();updateFavBtn();
            }));
        }

        // Kedvenc gomb az üzenet buborékban
        document.getElementById('favBtn').addEventListener('click',function(e){
            e.stopPropagation();
            if(!lastMsg)return;
            let favs=getFavs();
            if(isFaved(lastMsg)){
                favs=favs.filter(f=>f.t!==lastMsg.t);
            } else {
                favs.unshift({t:lastMsg.t,e:lastMsg.e,d:new Date().toLocaleDateString('hu-HU',{year:'numeric',month:'short',day:'numeric'})});
            }
            saveFavs(favs);updateFavBtn();updateFavsUI();
        });

        // Kedvencek panel megnyitás/bezárás
        document.getElementById('favsToggle').addEventListener('click',function(){
            renderFavsList();document.getElementById('favsPanel').classList.add('open');
        });
        document.getElementById('favsClose').addEventListener('click',function(){
            document.getElementById('favsPanel').classList.remove('open');
        });
        document.getElementById('favsPanel').addEventListener('click',function(e){
            if(e.target===this) this.classList.remove('open');
        });

        updateFavsUI();

        // Megosztás gomb — képes kártya generálás
        document.getElementById('shareBtn').addEventListener('click',function(e){
            e.stopPropagation();
            if(!lastMsg)return;
            const shareBtn=this;
            shareBtn.textContent='⏳ Készül...';
            createShareCard(lastMsg).then(blob=>{
                if(navigator.share&&navigator.canShare){
                    const file=new File([blob],'dailybot.png',{type:'image/png'});
                    if(navigator.canShare({files:[file]})){
                        navigator.share({files:[file]}).catch(()=>{});
                    } else {
                        navigator.share({text:lastMsg.e+' '+lastMsg.t+'\n\n— DailyBot 🤖'}).catch(()=>{});
                    }
                } else {
                    // Fallback: letöltés
                    const a=document.createElement('a');
                    a.href=URL.createObjectURL(blob);a.download='dailybot.png';a.click();
                    URL.revokeObjectURL(a.href);
                }
                shareBtn.textContent='📤 Megosztás';
            }).catch(()=>{shareBtn.textContent='📤 Megosztás'});
        });

        function createShareCard(msg){
            return new Promise(resolve=>{
                const W=720,H=960;
                const c=document.createElement('canvas');c.width=W;c.height=H;
                const ctx=c.getContext('2d');

                // Háttér gradiens
                const bg=ctx.createLinearGradient(0,0,W,H);
                bg.addColorStop(0,'#38bdf8');bg.addColorStop(0.35,'#818cf8');
                bg.addColorStop(0.6,'#a855f7');bg.addColorStop(0.85,'#ec4899');
                bg.addColorStop(1,'#f97316');
                ctx.fillStyle=bg;
                roundRect(ctx,0,0,W,H,0);ctx.fill();

                // Üveg kártya
                ctx.fillStyle='rgba(255,255,255,0.12)';
                roundRect(ctx,50,200,W-100,H-340,36);ctx.fill();
                ctx.strokeStyle='rgba(255,255,255,0.25)';ctx.lineWidth=2;
                roundRect(ctx,50,200,W-100,H-340,36);ctx.stroke();

                // Emoji
                ctx.font='80px sans-serif';
                ctx.textAlign='center';
                ctx.fillText(msg.e,W/2,320);

                // Üzenet szöveg — sortörés
                ctx.fillStyle='#ffffff';
                ctx.font='bold 30px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
                ctx.textAlign='center';
                const lines=wrapText(ctx,msg.t,W-160);
                const startY=380;
                lines.forEach((line,i)=>{
                    ctx.fillText(line,W/2,startY+i*44);
                });

                // DailyBot felirat alul
                ctx.fillStyle='rgba(255,255,255,0.5)';
                ctx.font='600 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
                ctx.fillText('DailyBot 🤖',W/2,H-80);

                // Dátum
                ctx.font='16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
                ctx.fillStyle='rgba(255,255,255,0.4)';
                ctx.fillText(msgDay().toLocaleDateString('hu-HU',{year:'numeric',month:'long',day:'numeric'}),W/2,H-50);

                c.toBlob(blob=>resolve(blob),'image/png');
            });
        }

        function wrapText(ctx,text,maxW){
            const words=text.split(' ');
            const lines=[];let line='';
            for(const w of words){
                const test=line?line+' '+w:w;
                if(ctx.measureText(test).width>maxW&&line){lines.push(line);line=w}
                else{line=test}
            }
            if(line)lines.push(line);
            return lines;
        }

        function roundRect(ctx,x,y,w,h,r){
            ctx.beginPath();
            ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
            ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
            ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
            ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
        }

        function show(anim){
            const m=dm();
            lastMsg=m;
            document.getElementById('bE').textContent=m.e;
            ph.classList.add('hide');
            const reaction=pickReaction(m);
            const favBtn=document.getElementById('favBtn');

            if(anim){
                initAudio();
                btn.classList.add('talking');
                setTimeout(()=>bubble.classList.add('show'),200);
                setTimeout(()=>{
                    typeText(document.getElementById('bT'),m.t,()=>{
                        btn.classList.remove('talking');
                        btn.classList.add(reaction);
                        updateFavBtn();
                    });
                },500);
                boom();mark();updateCountdown();
            } else {
                document.getElementById('bT').textContent=m.t;
                bubble.classList.add('show');
                btn.classList.add(reaction);
                updateFavBtn();
            }
            done=true;
        }

        function boom(){
            const cols=['#fff','#fde68a','#fbbf24','#818cf8','#a855f7','#ec4899','#38bdf8','#34d399'];
            const r=btn.getBoundingClientRect();
            const cx=r.left+r.width/2,cy=r.top+r.height/3;
            for(let i=0;i<50;i++){
                const el=document.createElement('div');el.className='cf';
                const sz=Math.random()*10+4,col=cols[Math.floor(Math.random()*cols.length)];
                const x=(Math.random()-.5)*400,y=(Math.random()-.8)*400,rot=(Math.random()-.5)*720;
                el.style.cssText=`width:${sz}px;height:${sz}px;background:${col};left:${cx}px;top:${cy}px;--x:${x}px;--y:${y}px;--r:${rot}deg;border-radius:${Math.random()>.5?'50%':'3px'}`;
                cfx.appendChild(el);setTimeout(()=>el.remove(),1200);
            }
        }

        // Tap reakció — integetés + "Hello!"
        let tapBusy=false;

        function playTapReaction(){
            if(tapBusy)return;
            tapBusy=true;
            initAudio();

            // Robot integet + szája mozog (talking)
            btn.classList.add('tap-wave');
            btn.classList.add('talking');

            // Cuki robot hang — "bi-bu-bí-bú-bíp!"
            if(audioCtx){
                const notes=[
                    {f:500,t:0,d:.15,type:'sine'},
                    {f:350,t:.16,d:.15,type:'sine'},
                    {f:700,t:.32,d:.12,type:'triangle'},
                    {f:450,t:.45,d:.1,type:'sine'},
                    {f:900,t:.56,d:.2,type:'triangle'},
                    {f:1100,t:.7,d:.12,type:'sine'},
                    {f:800,t:.82,d:.25,type:'triangle'},
                ];
                notes.forEach(n=>{
                    setTimeout(()=>{
                        const o=audioCtx.createOscillator(),g=audioCtx.createGain();
                        o.connect(g);g.connect(audioCtx.destination);
                        o.frequency.value=n.f;
                        o.type=n.type;
                        g.gain.value=0.07;
                        g.gain.linearRampToValueAtTime(0.08,audioCtx.currentTime+n.d*0.3);
                        g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+n.d);
                        o.start();o.stop(audioCtx.currentTime+n.d);
                    },n.t*1000);
                });
            }

            // Buborékban "Hello!" megjelenik
            const bE=document.getElementById('bE');
            const bT=document.getElementById('bT');
            const oldE=bE.textContent, oldT=bT.textContent;
            bE.textContent='👋';
            bT.textContent='';
            bubble.classList.add('show');

            // "Hello!" gépelés
            typeText(bT,'Hello!',()=>{
                btn.classList.remove('talking');
                // 1.5 mp múlva visszaáll az eredeti üzenetre
                setTimeout(()=>{
                    bE.textContent=oldE;
                    bT.textContent=oldT;
                    btn.classList.remove('tap-wave');
                    tapBusy=false;
                },1500);
            });

        }

        // ========== DRAG (húzd meg a robotot) ==========
        let isDragging=false, dragStartX=0, dragStartY=0, hasMoved=false;
        const robotEl=document.getElementById('robot');

        btn.addEventListener('touchstart',e=>{
            const t=e.touches[0];
            dragStartX=t.clientX;dragStartY=t.clientY;
            hasMoved=false;
        },{passive:true});

        btn.addEventListener('touchmove',e=>{
            if(tapBusy)return;
            const t=e.touches[0];
            const dx=t.clientX-dragStartX, dy=t.clientY-dragStartY;
            if(!isDragging&&(Math.abs(dx)>10||Math.abs(dy)>10)){
                isDragging=true;hasMoved=true;
                btn.classList.add('dragging');
            }
            if(isDragging){
                // Robot pozíció limitálva
                const mx=Math.max(-80,Math.min(80,dx));
                const my=Math.max(-80,Math.min(80,dy));
                robotEl.style.transform=`translate(${mx}px,${my}px)`;
            }
        },{passive:true});

        btn.addEventListener('touchend',()=>{
            if(isDragging){
                isDragging=false;
                btn.classList.remove('dragging');
                // Visszapattanás
                robotEl.style.transition='transform .4s cubic-bezier(.34,1.56,.64,1)';
                robotEl.style.transform='';
                setTimeout(()=>{robotEl.style.transition='';},500);
            }
        },{passive:true});

        btn.addEventListener('click',e=>{
            if(hasMoved){hasMoved=false;return}
            if(!done&&!seen()){show(true)}
            else if(done){playTapReaction()}
        });
        if(seen())show(false);

        // ========== VISSZASZÁMLÁLÓ ==========
        const nextMsgEl=document.getElementById('nextMsg');
        function updateCountdown(){
            if(!seen()){nextMsgEl.textContent='';return}
            const now=new Date();
            const next8=new Date(now);
            if(now.getHours()>=8)next8.setDate(next8.getDate()+1);
            next8.setHours(8,0,0,0);
            const diff=next8-now;
            const h=Math.floor(diff/3600000);
            const m=Math.floor((diff%3600000)/60000);
            const s=Math.floor((diff%60000)/1000);
            nextMsgEl.textContent=`🕐 Következő üzenet: ${h} óra ${m} perc ${s} mp múlva`;
        }
        updateCountdown();
        setInterval(updateCountdown,1000);

        // ========== Service Worker + Értesítések ==========
        if('serviceWorker' in navigator){
            navigator.serviceWorker.register('sw.js').then(reg=>{
                // Értesítés engedély kérés első koppintáskor
                btn.addEventListener('click',function askNotif(){
                    if('Notification' in window && Notification.permission==='default'){
                        Notification.requestPermission().then(p=>{
                            if(p==='granted') startNotifications(reg);
                        });
                    }
                    btn.removeEventListener('click',askNotif);
                },{once:true});

                // Ha már engedélyezve van
                if('Notification' in window && Notification.permission==='granted'){
                    startNotifications(reg);
                }
            });
        }

        function startNotifications(reg){
            // Értesítés belépéskor
            if(!seen()){
                reg.showNotification('DailyBot 🤖',{
                    body:'Ma is vár rád egy új gondolat! ✨',
                    icon:'./icon/dailybot-icon.png',
                    tag:'open-'+td()
                });
            }

            // SW-nek szólunk: ütemezzen értesítéseket
            if(reg.active) reg.active.postMessage({type:'schedule'});

            // Periodic Background Sync (Android Chrome)
            if('periodicSync' in reg){
                reg.periodicSync.register('daily-notification',{minInterval:4*60*60*1000}).catch(()=>{});
            }
        }
    </script>
