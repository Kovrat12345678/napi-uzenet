<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DailyBot">
    <meta name="theme-color" content="#7c3aed">
    <link rel="apple-touch-icon" href="icon/dailybot-icon.png">
    <link rel="manifest" href="manifest.json">
    <title>DailyBot</title>
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
        html{background:linear-gradient(165deg, #38bdf8 0%, #818cf8 30%, #a855f7 55%, #ec4899 80%, #f97316 100%);height:100%}
        body{width:100%;min-height:100%;min-height:100dvh;overflow:hidden;touch-action:manipulation;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
            background: linear-gradient(165deg, #38bdf8 0%, #818cf8 30%, #a855f7 55%, #ec4899 80%, #f97316 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
        .star{position:absolute;width:0;height:0}
        .star::before{content:'✦';color:rgba(255,255,255,0.6);font-size:var(--s);position:absolute;animation:twinkle var(--d) ease-in-out infinite}
        @keyframes twinkle{0%,100%{opacity:.2;transform:scale(.7)}50%{opacity:1;transform:scale(1.3)}}

        .app {
            position:relative;z-index:1;
            display:flex;flex-direction:column;align-items:center;
            width:100%;max-width:400px;
            height:100dvh;height:100vh;
            padding:16px 20px;
            padding-top:calc(env(safe-area-inset-top, 20px) + 28px);
            padding-bottom:calc(env(safe-area-inset-bottom, 0px) + 8px);
            justify-content:space-between;
        }

        /* FEJLÉC */
        .top{text-align:center;flex-shrink:0}
        .top h1{font-size:24px;font-weight:800;color:#fff;text-shadow:0 2px 12px rgba(0,0,0,.2)}
        .date{font-size:13px;color:rgba(255,255,255,.7);margin-top:3px;font-weight:500}
        .streak{display:none;margin-top:8px;padding:4px 14px;border-radius:100px;background:rgba(255,255,255,.18);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);color:#fff;font-size:13px;font-weight:600;border:1px solid rgba(255,255,255,.2)}
        .streak.on{display:inline-block}

        /* KÖVETKEZŐ ÜZENET VISSZASZÁMLÁLÓ */
        .next-msg{text-align:center;flex-shrink:0;min-height:20px;padding:4px 0;color:rgba(255,255,255,.65);font-size:12px;font-weight:500;letter-spacing:.3px}

        /* BUBORÉK */
        .bubble-wrap{width:100%;min-height:80px;display:flex;align-items:flex-end;justify-content:center;flex-shrink:0;padding-bottom:10px}
        .bubble{
            position:relative;width:100%;
            background:rgba(255,255,255,.15);
            backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
            border:1.5px solid rgba(255,255,255,.3);
            border-radius:22px;padding:22px 20px 26px;text-align:center;
            box-shadow:0 10px 35px rgba(0,0,0,.12),inset 0 1px 0 rgba(255,255,255,.3);
            opacity:0;transform:scale(.4) translateY(20px);pointer-events:none;
            transition:all .5s cubic-bezier(.34,1.56,.64,1);
        }
        .bubble.show{opacity:1;transform:scale(1) translateY(0);pointer-events:auto}
        .bubble::after{content:'';position:absolute;bottom:-14px;left:50%;transform:translateX(-50%);border-left:13px solid transparent;border-right:13px solid transparent;border-top:16px solid rgba(255,255,255,.15)}
        .bubble-heart{position:absolute;top:-12px;right:-6px;font-size:26px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.15));opacity:0;transform:scale(0);transition:all .4s cubic-bezier(.34,1.56,.64,1) .3s}
        .bubble.show .bubble-heart{opacity:1;transform:scale(1) rotate(-12deg)}
        .b-emoji{font-size:34px;display:block;margin-bottom:10px}
        .b-text{font-size:17px;line-height:1.55;color:#fff;font-weight:600;min-height:52px;text-shadow:0 1px 6px rgba(0,0,0,.2)}
        .cursor{display:inline-block;width:2px;height:18px;background:#fff;margin-left:2px;vertical-align:text-bottom;animation:blink .6s step-end infinite}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

        /* PLACEHOLDER */
        .ph{text-align:center;position:absolute;transition:opacity .3s}
        .ph.hide{opacity:0;pointer-events:none}
        .ph p{color:rgba(255,255,255,.7);font-size:16px;font-weight:600;line-height:1.5}
        .ph .arr{display:inline-block;margin-top:10px;font-size:28px;animation:bob 1.3s ease-in-out infinite}
        @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(10px)}}

        /* ===== ROBOT ===== */
        .robot-area{flex:1;display:flex;align-items:center;justify-content:center;min-height:0;width:100%}
        .robot-btn{background:none;border:none;cursor:pointer;padding:0;outline:none;-webkit-tap-highlight-color:transparent}
        .robot-btn:active .robot{transform:scale(.95)}

        .robot{
            width:200px;height:280px;position:relative;
            transition:transform .15s ease;
            animation:float 3s ease-in-out infinite;
            filter:drop-shadow(0 20px 30px rgba(0,0,0,.2));
        }
        @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

        /* Antenna */
        .antenna-stick{position:absolute;top:0;left:50%;transform:translateX(-50%);width:4px;height:28px;background:linear-gradient(to bottom,#94a3b8,#cbd5e1);border-radius:2px}
        .antenna-ball{position:absolute;top:-8px;left:50%;transform:translateX(-50%);width:16px;height:16px;background:radial-gradient(circle at 40% 35%,#fde68a,#f59e0b);border-radius:50%;box-shadow:0 0 12px rgba(251,191,36,.6);animation:glow 2s ease-in-out infinite}
        @keyframes glow{0%,100%{box-shadow:0 0 8px rgba(251,191,36,.4)}50%{box-shadow:0 0 24px rgba(251,191,36,.9),0 0 48px rgba(251,191,36,.3)}}

        /* Fej */
        .head{
            position:absolute;top:26px;left:50%;transform:translateX(-50%);
            width:130px;height:110px;
            background:linear-gradient(165deg,#f1f5f9 0%,#e2e8f0 40%,#cbd5e1 100%);
            border-radius:40px 40px 32px 32px;
            box-shadow:0 4px 15px rgba(0,0,0,.1),inset 0 2px 0 rgba(255,255,255,.8),inset 0 -2px 4px rgba(0,0,0,.05);
            overflow:hidden;
        }

        /* Arc kijelző */
        .face-screen{
            position:absolute;top:18px;left:14px;right:14px;bottom:18px;
            background:linear-gradient(180deg,#0f172a,#1e293b);
            border-radius:24px;
            box-shadow:inset 0 2px 8px rgba(0,0,0,.5),0 1px 0 rgba(255,255,255,.15);
            overflow:hidden;
        }
        .face-screen::before{content:'';position:absolute;top:0;left:20%;width:60%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent)}

        /* Szemek */
        .eyes{display:flex;justify-content:center;gap:26px;padding-top:20px;position:relative;z-index:2}
        .eye{
            width:24px;height:24px;
            background:radial-gradient(circle at 50% 50%,#7dd3fc,#38bdf8,#0284c7);
            border-radius:50%;
            box-shadow:0 0 10px rgba(56,189,248,.6),0 0 20px rgba(56,189,248,.3);
            position:relative;
            animation:eyeIdle 4s ease-in-out infinite;
        }
        .eye::after{content:'';position:absolute;top:3px;left:5px;width:7px;height:7px;background:rgba(255,255,255,.7);border-radius:50%}

        @keyframes eyeIdle{0%,90%,100%{transform:scaleY(1)}95%{transform:scaleY(.1)}}

        /* Beszéd közben szemek */
        .robot-btn.talking .eye{
            animation:none;
            box-shadow:0 0 14px rgba(56,189,248,.8),0 0 28px rgba(56,189,248,.4);
        }

        /* Száj */
        .mouth{
            width:28px;height:3px;
            background:#38bdf8;
            border-radius:3px;
            margin:14px auto 0;
            box-shadow:0 0 8px rgba(56,189,248,.5);
            transition:all .3s ease;
        }
        .robot-btn.talking .mouth{
            width:20px;height:14px;
            border-radius:50%;
            background:transparent;
            border:2px solid #38bdf8;
            animation:speak .3s ease infinite;
        }
        @keyframes speak{0%,100%{transform:scaleY(1)}50%{transform:scaleY(.5)}}

        /* happy alapstílusok az új reakció blokkban vannak */

        /* Fül */
        .ear{
            position:absolute;top:50px;
            width:14px;height:24px;
            background:linear-gradient(to bottom,#e2e8f0,#cbd5e1);
            border-radius:6px;
            box-shadow:0 2px 4px rgba(0,0,0,.1);
        }
        .ear-l{left:22px}.ear-r{right:22px}
        .ear::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:6px;height:6px;border-radius:50%;background:#94a3b8}

        /* Nyak */
        .neck{position:absolute;top:134px;left:50%;transform:translateX(-50%);width:30px;height:16px;background:linear-gradient(to bottom,#cbd5e1,#94a3b8);border-radius:4px}
        .neck::before,.neck::after{content:'';position:absolute;width:24px;height:3px;background:#94a3b8;border-radius:2px;left:50%;transform:translateX(-50%)}
        .neck::before{top:3px}.neck::after{bottom:3px}

        /* Törzs */
        .torso{
            position:absolute;top:148px;left:50%;transform:translateX(-50%);
            width:120px;height:90px;
            background:linear-gradient(165deg,#f1f5f9 0%,#e2e8f0 50%,#cbd5e1 100%);
            border-radius:20px 20px 24px 24px;
            box-shadow:0 6px 20px rgba(0,0,0,.1),inset 0 2px 0 rgba(255,255,255,.6);
        }

        /* Mellkas panel */
        .chest{
            position:absolute;top:12px;left:50%;transform:translateX(-50%);
            width:56px;height:56px;
            background:linear-gradient(145deg,#0f172a,#1e293b);
            border-radius:14px;
            box-shadow:inset 0 2px 6px rgba(0,0,0,.5),0 1px 0 rgba(255,255,255,.1);
            display:flex;align-items:center;justify-content:center;
            overflow:hidden;
        }
        .chest::before{content:'';position:absolute;inset:2px;border-radius:12px;border:1px solid rgba(56,189,248,.15)}
        .heart-icon{font-size:24px;animation:heartbeat 1.5s ease infinite;position:relative;z-index:1}
        @keyframes heartbeat{0%,100%{transform:scale(1)}15%{transform:scale(1.25)}30%{transform:scale(1)}}

        .robot-btn.talking .heart-icon{animation:heartbeat .6s ease infinite}

        /* Mellkas fények */
        .chest-dots{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);display:flex;gap:4px}
        .chest-dot{width:4px;height:4px;border-radius:50%;background:#38bdf8;opacity:.4}
        .robot-btn.talking .chest-dot{animation:dotPulse .8s ease infinite}
        .chest-dot:nth-child(2){animation-delay:.15s!important}
        .chest-dot:nth-child(3){animation-delay:.3s!important}
        @keyframes dotPulse{0%,100%{opacity:.3}50%{opacity:1;box-shadow:0 0 6px rgba(56,189,248,.8)}}

        /* Karok */
        .arm{
            position:absolute;top:155px;
            width:24px;height:70px;
            background:linear-gradient(to bottom,#e2e8f0,#cbd5e1);
            border-radius:12px;
            transform-origin:top center;
            box-shadow:0 4px 8px rgba(0,0,0,.08);
        }
        .arm-l{left:18px;transform:rotate(6deg)}.arm-r{right:18px;transform:rotate(-6deg)}
        .arm::after{content:'';position:absolute;bottom:-2px;left:50%;transform:translateX(-50%);width:20px;height:16px;background:linear-gradient(to bottom,#cbd5e1,#94a3b8);border-radius:0 0 10px 10px}

        .robot-btn.talking .arm-l{animation:waveL 1s ease infinite}
        .robot-btn.talking .arm-r{animation:waveR 1s ease infinite}
        .robot-btn.happy .arm-l{transform:rotate(-25deg)}
        .robot-btn.happy .arm-r{transform:rotate(25deg)}
        @keyframes waveL{0%,100%{transform:rotate(6deg)}50%{transform:rotate(-10deg)}}
        @keyframes waveR{0%,100%{transform:rotate(-6deg)}50%{transform:rotate(10deg)}}

        /* Vállpánt */
        .shoulder{position:absolute;top:150px;width:12px;height:12px;background:#cbd5e1;border-radius:50%;box-shadow:inset 0 1px 2px rgba(0,0,0,.15)}
        .shoulder-l{left:26px}.shoulder-r{right:26px}

        /* Lábak */
        .legs{position:absolute;bottom:0;left:50%;transform:translateX(-50%);display:flex;gap:16px}
        .leg{width:28px;height:36px;background:linear-gradient(to bottom,#cbd5e1,#94a3b8);border-radius:8px 8px 12px 12px;box-shadow:0 4px 8px rgba(0,0,0,.1)}
        .foot{position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:36px;height:10px;background:linear-gradient(to bottom,#94a3b8,#64748b);border-radius:0 0 8px 8px}


        /* ===== ROBOT REAKCIÓK ===== */

        /* EXCITED — izgatott ugrálás, tapsolás, ragyogó szemek */
        .robot-btn.excited .robot{animation:excitedBounce .5s cubic-bezier(.36,1.4,.5,1) infinite}
        @keyframes excitedBounce{0%,100%{transform:translateY(0) scale(1)}30%{transform:translateY(-20px) scale(1.05)}60%{transform:translateY(-5px) scale(.98)}}
        .robot-btn.excited .eye{
            animation:excitedEye .6s ease infinite;
            background:radial-gradient(circle,#fff,#67e8f9,#06b6d4);
            box-shadow:0 0 20px rgba(6,182,212,.9),0 0 40px rgba(6,182,212,.4),0 0 60px rgba(6,182,212,.2);
        }
        @keyframes excitedEye{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}
        .robot-btn.excited .antenna-ball{
            animation:excitedAntenna .3s ease-in-out infinite;
            box-shadow:0 0 20px rgba(251,191,36,.9),0 0 40px rgba(251,191,36,.5);
        }
        @keyframes excitedAntenna{0%,100%{transform:translateX(-50%) scale(1)}50%{transform:translateX(-50%) scale(1.4)}}
        .robot-btn.excited .arm-l{animation:excitedArmL .25s ease infinite;transform-origin:top center}
        .robot-btn.excited .arm-r{animation:excitedArmR .25s ease infinite;transform-origin:top center}
        @keyframes excitedArmL{0%{transform:rotate(-40deg)}50%{transform:rotate(15deg)}100%{transform:rotate(-40deg)}}
        @keyframes excitedArmR{0%{transform:rotate(40deg)}50%{transform:rotate(-15deg)}100%{transform:rotate(40deg)}}
        .robot-btn.excited .mouth{
            width:24px;height:12px;background:transparent;
            border-bottom:3px solid #22d3ee;border-radius:0 0 50% 50%;
            box-shadow:0 4px 12px rgba(34,211,238,.5);animation:none;border-top:none;border-left:none;border-right:none;
        }
        .robot-btn.excited .heart-icon{animation:heartbeat .3s ease infinite}
        .robot-btn.excited .chest-dot{animation:dotPulse .3s ease infinite}
        .robot-btn.excited .leg{animation:excitedLeg .5s ease infinite}
        .robot-btn.excited .leg:nth-child(2){animation-delay:.25s}
        @keyframes excitedLeg{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}

        /* CARING — gyengéd ringás, lila fény, ölelő karok */
        .robot-btn.caring .robot{animation:caringFloat 3s ease-in-out infinite}
        @keyframes caringFloat{0%,100%{transform:translateY(0) rotate(-2deg)}25%{transform:translateY(-6px) rotate(0deg)}50%{transform:translateY(-3px) rotate(2deg)}75%{transform:translateY(-8px) rotate(0deg)}}
        .robot-btn.caring .eye{
            animation:caringEye 3s ease-in-out infinite;
            background:radial-gradient(circle,#e9d5ff,#c084fc,#9333ea);
            box-shadow:0 0 16px rgba(147,51,234,.7),0 0 32px rgba(147,51,234,.3);
        }
        @keyframes caringEye{0%,100%{transform:scaleY(1)}40%{transform:scaleY(1)}45%{transform:scaleY(.3)}50%{transform:scaleY(1)}90%{transform:scaleY(1)}95%{transform:scaleY(.3)}}
        .robot-btn.caring .mouth{
            width:20px;height:10px;background:transparent;
            border-bottom:3px solid #c084fc;border-radius:0 0 50% 50%;
            box-shadow:0 3px 8px rgba(192,132,252,.4);animation:none;border-top:none;border-left:none;border-right:none;
        }
        .robot-btn.caring .arm-l{animation:caringArmL 2s ease-in-out infinite;transform-origin:top center}
        .robot-btn.caring .arm-r{animation:caringArmR 2s ease-in-out infinite;transform-origin:top center}
        @keyframes caringArmL{0%,100%{transform:rotate(6deg)}50%{transform:rotate(-20deg)}}
        @keyframes caringArmR{0%,100%{transform:rotate(-6deg)}50%{transform:rotate(20deg)}}
        .robot-btn.caring .heart-icon{animation:caringHeart 1.5s ease infinite}
        @keyframes caringHeart{0%,100%{transform:scale(1)}25%{transform:scale(1.3)}50%{transform:scale(1)}75%{transform:scale(1.15)}}
        .robot-btn.caring .antenna-ball{
            background:radial-gradient(circle at 40% 35%,#e9d5ff,#a855f7);
            box-shadow:0 0 16px rgba(168,85,247,.7),0 0 32px rgba(168,85,247,.3);
            animation:caringGlow 2s ease-in-out infinite;
        }
        @keyframes caringGlow{0%,100%{box-shadow:0 0 10px rgba(168,85,247,.4)}50%{box-shadow:0 0 28px rgba(168,85,247,.9),0 0 50px rgba(168,85,247,.3)}}
        .robot-btn.caring .chest-dot{background:#c084fc}

        /* THINKING — fej döntés, szemek keresgélnek, száj "hmm" */
        .robot-btn.thinking .robot{animation:thinkFloat 4s ease-in-out infinite}
        @keyframes thinkFloat{0%,100%{transform:translateY(0) rotate(0deg)}30%{transform:translateY(-5px) rotate(4deg)}60%{transform:translateY(-2px) rotate(-2deg)}}
        .robot-btn.thinking .head{animation:thinkHead 4s ease-in-out infinite}
        @keyframes thinkHead{0%,100%{transform:translateX(-50%) rotate(0deg)}30%{transform:translateX(-50%) rotate(6deg)}70%{transform:translateX(-50%) rotate(-3deg)}}
        .robot-btn.thinking .eye{
            animation:thinkEye 3s ease-in-out infinite;
            background:radial-gradient(circle,#fef9c3,#fbbf24,#d97706);
            box-shadow:0 0 12px rgba(251,191,36,.6),0 0 24px rgba(251,191,36,.3);
        }
        @keyframes thinkEye{0%,100%{transform:translateX(0) scaleY(1)}20%{transform:translateX(5px) scaleY(.9)}50%{transform:translateX(-4px) scaleY(1)}70%{transform:translateX(3px) scaleY(.85)}85%{transform:translateX(0) scaleY(1)}}
        .robot-btn.thinking .mouth{
            width:14px;height:14px;background:transparent;
            border:2px solid #fbbf24;border-radius:50%;
            box-shadow:0 0 8px rgba(251,191,36,.4);animation:thinkMouth 2s ease infinite;
            border-top:none;border-left:none;border-right:none;
            border-bottom:2px solid #fbbf24;border-radius:0 0 50% 50%;
            width:18px;height:8px;
        }
        @keyframes thinkMouth{0%,100%{transform:scaleX(1)}50%{transform:scaleX(.7)}}
        .robot-btn.thinking .arm-l{transform:rotate(6deg)}
        .robot-btn.thinking .arm-r{animation:thinkArmR 4s ease-in-out infinite;transform-origin:top center}
        @keyframes thinkArmR{0%,100%{transform:rotate(-6deg)}50%{transform:rotate(-50deg)}}
        .robot-btn.thinking .antenna-ball{
            animation:thinkAntenna 1s ease-in-out infinite;
            background:radial-gradient(circle at 40% 35%,#fef9c3,#f59e0b);
            box-shadow:0 0 14px rgba(245,158,11,.7),0 0 28px rgba(245,158,11,.3);
        }
        @keyframes thinkAntenna{0%,100%{box-shadow:0 0 8px rgba(245,158,11,.4);transform:translateX(-50%) scale(1)}50%{box-shadow:0 0 24px rgba(245,158,11,1),0 0 48px rgba(245,158,11,.4);transform:translateX(-50%) scale(1.3)}}

        /* DANCING — party mód, teljes test táncol */
        .robot-btn.dancing .robot{animation:danceBody .8s cubic-bezier(.4,0,.2,1) infinite}
        @keyframes danceBody{0%{transform:translateY(0) rotate(-4deg) scaleY(1)}25%{transform:translateY(-14px) rotate(0deg) scaleY(1.03)}50%{transform:translateY(0) rotate(4deg) scaleY(.97)}75%{transform:translateY(-10px) rotate(0deg) scaleY(1.02)}100%{transform:translateY(0) rotate(-4deg) scaleY(1)}}
        .robot-btn.dancing .eye{
            animation:discoEye .4s ease infinite;
            box-shadow:0 0 18px rgba(236,72,153,.9),0 0 36px rgba(236,72,153,.4);
            background:radial-gradient(circle,#fff,#f9a8d4,#ec4899);
        }
        @keyframes discoEye{0%,100%{background:radial-gradient(circle,#fff,#f9a8d4,#ec4899);transform:scale(1)}33%{background:radial-gradient(circle,#fff,#67e8f9,#06b6d4)}66%{background:radial-gradient(circle,#fff,#c4b5fd,#8b5cf6);transform:scale(1.1)}}
        .robot-btn.dancing .mouth{
            width:28px;height:14px;background:transparent;
            border-bottom:3px solid #ec4899;border-radius:0 0 50% 50%;
            box-shadow:0 4px 12px rgba(236,72,153,.5);animation:none;border-top:none;border-left:none;border-right:none;
        }
        .robot-btn.dancing .arm-l{animation:danceArmL .4s cubic-bezier(.4,0,.2,1) infinite;transform-origin:top center}
        .robot-btn.dancing .arm-r{animation:danceArmR .4s cubic-bezier(.4,0,.2,1) infinite;transform-origin:top center}
        @keyframes danceArmL{0%{transform:rotate(-45deg)}50%{transform:rotate(20deg)}100%{transform:rotate(-45deg)}}
        @keyframes danceArmR{0%{transform:rotate(20deg)}50%{transform:rotate(-45deg)}100%{transform:rotate(20deg)}}
        .robot-btn.dancing .leg:first-child{animation:danceLegL .8s ease infinite}
        .robot-btn.dancing .leg:last-child{animation:danceLegR .8s ease infinite}
        @keyframes danceLegL{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-6px) rotate(-8deg)}}
        @keyframes danceLegR{0%,100%{transform:translateY(-6px) rotate(8deg)}50%{transform:translateY(0) rotate(0deg)}}
        .robot-btn.dancing .antenna-ball{
            animation:discoAntenna .4s ease infinite;
        }
        @keyframes discoAntenna{0%,100%{background:radial-gradient(circle,#fde68a,#f59e0b);box-shadow:0 0 20px rgba(251,191,36,.8)}33%{background:radial-gradient(circle,#f9a8d4,#ec4899);box-shadow:0 0 20px rgba(236,72,153,.8)}66%{background:radial-gradient(circle,#c4b5fd,#8b5cf6);box-shadow:0 0 20px rgba(139,92,246,.8)}}
        .robot-btn.dancing .heart-icon{animation:heartbeat .4s ease infinite}
        .robot-btn.dancing .chest-dot{animation:dotPulse .25s ease infinite}
        .robot-btn.dancing .head{animation:danceHead .4s ease infinite}
        @keyframes danceHead{0%,100%{transform:translateX(-50%) rotate(-3deg)}50%{transform:translateX(-50%) rotate(3deg)}}

        /* HAPPY — boldog (alapértelmezett, továbbfejlesztve) */
        .robot-btn.happy .robot{animation:happyFloat 2s ease-in-out infinite}
        @keyframes happyFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
        .robot-btn.happy .mouth{
            width:32px;height:16px;background:transparent;
            border-bottom:3px solid #38bdf8;border-radius:0 0 50% 50%;
            box-shadow:0 4px 10px rgba(56,189,248,.4);border-top:none;border-left:none;border-right:none;
        }
        .robot-btn.happy .eye{
            animation:happyEye 3s ease-in-out infinite;
            height:6px;border-radius:6px 6px 0 0;background:#38bdf8;
            box-shadow:0 0 14px rgba(56,189,248,.7),0 0 28px rgba(56,189,248,.3);
        }
        .robot-btn.happy .eye::after{display:none}
        @keyframes happyEye{0%,80%,100%{transform:scaleX(1)}90%{transform:scaleX(.8)}}
        .robot-btn.happy .arm-l{animation:happyArmL 1.5s ease-in-out infinite;transform-origin:top center}
        .robot-btn.happy .arm-r{animation:happyArmR 1.5s ease-in-out infinite;transform-origin:top center}
        @keyframes happyArmL{0%,100%{transform:rotate(-25deg)}50%{transform:rotate(-35deg)}}
        @keyframes happyArmR{0%,100%{transform:rotate(25deg)}50%{transform:rotate(35deg)}}

        /* ===== TAP REAKCIÓK (interaktív) ===== */

        /* Pörgés */
        .robot-btn.tap-spin .robot{animation:tapSpin .6s cubic-bezier(.4,0,.2,1) forwards}
        @keyframes tapSpin{0%{transform:rotate(0deg) scale(1)}50%{transform:rotate(180deg) scale(.9)}100%{transform:rotate(360deg) scale(1)}}

        /* Ugrás */
        .robot-btn.tap-jump .robot{animation:tapJump .5s cubic-bezier(.4,0,.2,1) forwards}
        @keyframes tapJump{0%{transform:translateY(0) scaleY(1)}15%{transform:translateY(4px) scaleY(.85) scaleX(1.1)}40%{transform:translateY(-40px) scaleY(1.1) scaleX(.95)}70%{transform:translateY(0) scaleY(.9)}100%{transform:translateY(0) scaleY(1)}}

        /* Kacsintás */
        .robot-btn.tap-wink .eye:first-child{animation:tapWink .4s ease forwards}
        @keyframes tapWink{0%{transform:scaleY(1)}30%{transform:scaleY(.1)}100%{transform:scaleY(1)}}

        /* Fejrázás (nem-nem) */
        .robot-btn.tap-shake .head{animation:tapShake .4s ease forwards}
        @keyframes tapShake{0%{transform:translateX(-50%) rotate(0)}20%{transform:translateX(-50%) rotate(8deg)}40%{transform:translateX(-50%) rotate(-8deg)}60%{transform:translateX(-50%) rotate(5deg)}80%{transform:translateX(-50%) rotate(-3deg)}100%{transform:translateX(-50%) rotate(0)}}

        /* Bólintás (igen) */
        .robot-btn.tap-nod .head{animation:tapNod .5s ease forwards}
        @keyframes tapNod{0%{transform:translateX(-50%) rotate(0)}25%{transform:translateX(-50%) rotate(-10deg)}50%{transform:translateX(-50%) rotate(0)}75%{transform:translateX(-50%) rotate(-8deg)}100%{transform:translateX(-50%) rotate(0)}}

        /* Taps (meghajlás) */
        .robot-btn.tap-bow .robot{animation:tapBow .7s ease forwards}
        @keyframes tapBow{0%{transform:rotate(0) translateY(0)}40%{transform:rotate(15deg) translateY(5px)}100%{transform:rotate(0) translateY(0)}}

        /* Wave (integetés) */
        .robot-btn.tap-wave .arm-r{animation:tapWave .6s ease forwards;transform-origin:top center}
        @keyframes tapWave{0%{transform:rotate(-6deg)}15%{transform:rotate(-50deg)}30%{transform:rotate(-30deg)}45%{transform:rotate(-50deg)}60%{transform:rotate(-30deg)}80%{transform:rotate(-50deg)}100%{transform:rotate(-6deg)}}

        /* Szívdobbanás */
        .robot-btn.tap-love .heart-icon{animation:tapLove .6s ease forwards}
        @keyframes tapLove{0%{transform:scale(1)}20%{transform:scale(1.8)}40%{transform:scale(1)}60%{transform:scale(1.5)}100%{transform:scale(1)}}
        .robot-btn.tap-love .eye{animation:tapLoveEye .6s ease forwards}
        @keyframes tapLoveEye{0%,100%{background:radial-gradient(circle,#7dd3fc,#38bdf8,#0284c7)}50%{background:radial-gradient(circle,#fda4af,#fb7185,#e11d48);box-shadow:0 0 16px rgba(225,29,72,.7)}}

        /* ===== FEHÉR NYUSZI MÓD (húsvét) ===== */

        /* Hosszú fehér fülek */
        .robot.bunny .antenna-stick{
            width:16px;height:60px;top:-34px;left:calc(50% - 24px);
            background:linear-gradient(to bottom,#fff,#f8fafc);
            border-radius:24px 24px 8px 8px;transform:rotate(-10deg);
            box-shadow:0 2px 8px rgba(0,0,0,.08);
        }
        .robot.bunny .antenna-stick::after{
            content:'';position:absolute;top:10px;left:3px;width:10px;height:38px;
            background:linear-gradient(to bottom,#fecdd3,#fda4af);border-radius:18px;
        }
        .robot.bunny .antenna-ball{
            width:16px;height:60px;top:-34px;left:calc(50% + 8px);
            background:linear-gradient(to bottom,#fff,#f8fafc);
            border-radius:24px 24px 8px 8px;transform:none;
            box-shadow:0 2px 8px rgba(0,0,0,.08);
            animation:bunnyEarR 2.5s ease-in-out infinite;
        }
        .robot.bunny .antenna-ball::after{
            content:'';position:absolute;top:10px;left:3px;width:10px;height:38px;
            background:linear-gradient(to bottom,#fecdd3,#fda4af);border-radius:18px;
        }
        @keyframes bunnyEarR{0%,100%{transform:rotate(0deg)}30%{transform:rotate(10deg)}60%{transform:rotate(-3deg)}}

        /* Hófehér fej */
        .robot.bunny .head{
            background:linear-gradient(165deg,#ffffff 0%,#f8fafc 40%,#f1f5f9 100%);
            border-radius:46px 46px 36px 36px;
            box-shadow:0 4px 15px rgba(0,0,0,.06),inset 0 2px 0 rgba(255,255,255,1);
        }

        /* Fehér arc kijelző helyett nyuszi arc */
        .robot.bunny .face-screen{
            background:linear-gradient(180deg,#f8fafc,#f1f5f9);
            box-shadow:inset 0 1px 4px rgba(0,0,0,.05);
        }

        /* Piros nyuszi szemek */
        .robot.bunny .eye{
            background:radial-gradient(circle,#fff,#fca5a5,#ef4444)!important;
            box-shadow:0 0 10px rgba(239,68,68,.4),0 0 20px rgba(239,68,68,.15)!important;
        }
        .robot.bunny .eye::after{background:rgba(255,255,255,.8)}

        /* Rózsaszín orr */
        .robot.bunny .mouth{
            width:12px!important;height:10px!important;
            background:radial-gradient(circle,#fecdd3,#fb7185)!important;
            border:none!important;border-radius:50%!important;
            box-shadow:0 2px 6px rgba(251,113,133,.3)!important;
            animation:bunnyNose 2s ease-in-out infinite!important;
            margin-top:12px!important;
        }
        @keyframes bunnyNose{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}

        /* Bajusz */
        .robot.bunny .face-screen::after{
            content:'';position:absolute;bottom:14px;left:50%;transform:translateX(-50%);
            width:70px;height:16px;
            background:
                linear-gradient(170deg,transparent 0%,rgba(0,0,0,.08) 10%,transparent 22%) 0 0/100% 1.5px no-repeat,
                linear-gradient(175deg,transparent 0%,rgba(0,0,0,.08) 10%,transparent 22%) 0 6px/100% 1.5px no-repeat,
                linear-gradient(190deg,transparent 78%,rgba(0,0,0,.08) 90%,transparent 100%) 0 0/100% 1.5px no-repeat,
                linear-gradient(185deg,transparent 78%,rgba(0,0,0,.08) 90%,transparent 100%) 0 6px/100% 1.5px no-repeat;
        }

        /* Hófehér test */
        .robot.bunny .torso{background:linear-gradient(165deg,#ffffff 0%,#f8fafc 50%,#f1f5f9 100%);box-shadow:0 6px 20px rgba(0,0,0,.06)}
        .robot.bunny .neck{background:linear-gradient(to bottom,#f1f5f9,#e2e8f0)}

        /* Fehér karok */
        .robot.bunny .arm{background:linear-gradient(to bottom,#ffffff,#f1f5f9)}
        .robot.bunny .arm::after{background:linear-gradient(to bottom,#f1f5f9,#e2e8f0)}
        .robot.bunny .shoulder{background:#f1f5f9}

        /* Fehér fülek (oldalsó) */
        .robot.bunny .ear{background:linear-gradient(to bottom,#ffffff,#f8fafc)}
        .robot.bunny .ear::after{background:#fecdd3}

        /* Fehér lábak, kerek tappancs */
        .robot.bunny .leg{background:linear-gradient(to bottom,#f8fafc,#f1f5f9)}
        .robot.bunny .foot{
            background:linear-gradient(to bottom,#fecdd3,#fda4af)!important;
            border-radius:50%!important;width:28px!important;height:14px!important;
        }

        /* Mellkas — fehér, rózsaszín szív */
        .robot.bunny .chest{
            background:linear-gradient(145deg,#f8fafc,#f1f5f9);
            box-shadow:inset 0 2px 4px rgba(0,0,0,.05);
        }
        .robot.bunny .chest::before{border-color:rgba(251,113,133,.15)}
        .robot.bunny .chest-dot{background:#fda4af}
        .robot.bunny .heart-icon{font-size:22px}

        /* Pompom farok */
        .robot.bunny .legs::after{
            content:'';position:absolute;top:-12px;right:-22px;
            width:22px;height:22px;
            background:radial-gradient(circle at 40% 40%,#ffffff,#f1f5f9);
            border-radius:50%;
            box-shadow:0 2px 8px rgba(0,0,0,.08),inset 0 -2px 4px rgba(0,0,0,.03);
            animation:bunnyTail 1.5s ease-in-out infinite;
        }
        @keyframes bunnyTail{0%,100%{transform:translateX(0) scale(1)}50%{transform:translateX(5px) scale(1.1)}}

        /* ===== KOVRAT NAP (márc 28.) — szíves robot ===== */
        .robot.love{animation:loveFloat 3s ease-in-out infinite}
        @keyframes loveFloat{0%,100%{transform:translateY(0) rotate(-1deg)}50%{transform:translateY(-8px) rotate(1deg)}}

        .robot.love .head{background:linear-gradient(165deg,#fff0f3 0%,#fecdd3 50%,#fda4af 100%);box-shadow:0 6px 20px rgba(244,63,94,.15)}
        .robot.love .face-screen{background:linear-gradient(145deg,#1a0010,#2d0020)}
        .robot.love .eye{
            background:radial-gradient(circle at 35% 35%,#fff,#fda4af,#f43f5e,#e11d48)!important;
            box-shadow:0 0 16px rgba(244,63,94,.7),0 0 32px rgba(244,63,94,.3)!important;
            animation:loveEye 2s ease-in-out infinite!important;
        }
        @keyframes loveEye{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
        .robot.love .mouth{
            width:20px!important;height:10px!important;background:transparent!important;
            border-bottom:3px solid #f43f5e!important;border-radius:0 0 50% 50%!important;
            border-top:none!important;border-left:none!important;border-right:none!important;
            box-shadow:0 3px 10px rgba(244,63,94,.4)!important;animation:none!important;
        }
        .robot.love .torso{background:linear-gradient(165deg,#fff0f3 0%,#fecdd3 50%,#fda4af 100%);box-shadow:0 6px 20px rgba(244,63,94,.12)}
        .robot.love .chest{background:linear-gradient(145deg,#4c0020,#2d0015);box-shadow:inset 0 2px 6px rgba(0,0,0,.5),0 0 10px rgba(244,63,94,.2)}
        .robot.love .chest::before{border-color:rgba(244,63,94,.25)}
        .robot.love .chest-dot{background:#f43f5e}
        .robot.love .heart-icon{font-size:28px;animation:loveHeart 1s ease infinite!important}
        @keyframes loveHeart{0%,100%{transform:scale(1)}25%{transform:scale(1.35)}50%{transform:scale(1)}}
        .robot.love .neck{background:linear-gradient(to bottom,#fecdd3,#fda4af)}
        .robot.love .neck::before,.robot.love .neck::after{background:#fda4af}
        .robot.love .arm{background:linear-gradient(to bottom,#fecdd3,#fda4af)}
        .robot.love .arm::after{background:linear-gradient(to bottom,#fda4af,#fb7185)}
        .robot.love .shoulder{background:#fecdd3}
        .robot.love .ear{background:linear-gradient(to bottom,#fff0f3,#fecdd3)}
        .robot.love .ear::after{background:#f43f5e}
        .robot.love .leg{background:linear-gradient(to bottom,#fecdd3,#fda4af)}
        .robot.love .foot{background:linear-gradient(to bottom,#fb7185,#f43f5e)!important;border-radius:0 0 10px 10px!important}
        .robot.love .antenna-ball{
            background:radial-gradient(circle at 35% 35%,#fda4af,#f43f5e,#e11d48)!important;
            box-shadow:0 0 14px rgba(244,63,94,.7)!important;
            animation:loveAntenna 1.5s ease-in-out infinite!important;
        }
        @keyframes loveAntenna{0%,100%{transform:translateX(-50%) scale(1)}50%{transform:translateX(-50%) scale(1.25)}}
        .robot.love .antenna-stick{background:linear-gradient(to top,#fda4af,#f43f5e)!important}

        /* Lebegő szívek */
        .love-heart{
            position:fixed;font-size:var(--sz);
            animation:floatHeart var(--d) linear infinite;
            top:-40px;left:var(--x);opacity:0;
            pointer-events:none;z-index:0;
        }
        @keyframes floatHeart{
            0%{transform:translateY(0) translateX(0) rotate(0deg);opacity:0}
            8%{opacity:.7}
            50%{transform:translateY(50vh) translateX(var(--sx)) rotate(180deg);opacity:.5}
            100%{transform:translateY(105vh) translateX(calc(var(--sx) * -1)) rotate(360deg);opacity:0}
        }

        /* ===== DRAG (húzás) ===== */
        .robot-btn.dragging .robot{animation:none!important;transition:none}
        .robot-btn.dragging .eye{
            animation:none!important;width:28px;height:28px;
            background:radial-gradient(circle,#fff,#fca5a5,#ef4444)!important;
            box-shadow:0 0 16px rgba(239,68,68,.8)!important;
        }
        .robot-btn.dragging .eye::after{width:10px;height:10px;top:4px;left:4px}
        .robot-btn.dragging .mouth{
            width:32px!important;height:18px!important;background:transparent!important;
            border:3px solid #ef4444!important;border-radius:50%!important;
            animation:dragMouth .2s ease infinite!important;
            box-shadow:0 0 10px rgba(239,68,68,.5)!important;
        }
        @keyframes dragMouth{0%,100%{transform:scaleY(1) scaleX(1)}50%{transform:scaleY(1.3) scaleX(.8)}}
        .robot-btn.dragging .arm-l{transform:rotate(-40deg)!important;animation:none!important}
        .robot-btn.dragging .arm-r{transform:rotate(40deg)!important;animation:none!important}
        .robot-btn.dragging .antenna-ball{
            animation:dragAntenna .3s ease infinite!important;
            background:radial-gradient(circle,#fca5a5,#ef4444)!important;
        }
        @keyframes dragAntenna{0%,100%{box-shadow:0 0 12px rgba(239,68,68,.6)}50%{box-shadow:0 0 24px rgba(239,68,68,1)}}

        /* ===== ÖLTÖZÉKEK ===== */
        .outfit{position:absolute;z-index:10;pointer-events:none;transition:all .3s}
        .outfit-hat{top:-10px;left:50%;transform:translateX(-50%);font-size:36px}
        .outfit-face{top:40px;left:50%;transform:translateX(-50%);font-size:28px;z-index:11}
        .outfit-neck{top:128px;left:50%;transform:translateX(-50%);font-size:22px}

        /* ===== IDŐJÁRÁS ANIMÁCIÓK ===== */
        .weather-layer{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}

        /* Eső */
        .raindrop{position:absolute;width:2px;background:linear-gradient(to bottom,transparent,rgba(255,255,255,.4));border-radius:0 0 2px 2px;animation:rain var(--d) linear infinite;top:-20px}
        @keyframes rain{0%{transform:translateY(-20px);opacity:0}10%{opacity:1}100%{transform:translateY(100vh);opacity:.3}}

        /* Hó */
        .snowflake{position:absolute;border-radius:50%;background:rgba(255,255,255,.8);animation:snow var(--d) linear infinite;top:-10px}
        @keyframes snow{0%{transform:translateY(-10px) translateX(0) rotate(0deg);opacity:0}10%{opacity:1}100%{transform:translateY(100vh) translateX(var(--sx)) rotate(360deg);opacity:.4}}

        /* Napsugarak */
        .sunray{position:absolute;top:-60px;left:50%;width:3px;background:linear-gradient(to bottom,rgba(255,255,0,.3),transparent);transform-origin:top center;animation:sunray 4s ease-in-out infinite}
        @keyframes sunray{0%,100%{opacity:.2;height:120px}50%{opacity:.5;height:180px}}

        /* Konfetti */
        .cfx{position:fixed;inset:0;pointer-events:none;z-index:99}
        .cf{position:absolute;animation:fly 1.1s ease-out forwards}
        @keyframes fly{0%{opacity:1;transform:translate(0,0) rotate(0deg) scale(1)}100%{opacity:0;transform:translate(var(--x),var(--y)) rotate(var(--r)) scale(0)}}
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    <div class="weather-layer" id="weatherLayer"></div>

    <div class="app">
        <div class="top">
            <h1>✨ DailyBot ✨</h1>
            <div class="date" id="date"></div>
            <div class="streak" id="streak">🔥 <span id="sn"></span> napos sorozat</div>
        </div>

        <div class="bubble-wrap">
            <div class="ph" id="ph">
                <p id="phText">Koppints a robotra!</p>
                <p id="phEvent" style="font-size:14px;color:rgba(255,255,255,.85);margin-top:6px;font-weight:700"></p>
                <span class="arr">👇</span>
            </div>
            <div class="bubble" id="bubble">
                <span class="bubble-heart">❤️</span>
                <span class="b-emoji" id="bE"></span>
                <div class="b-text" id="bT"></div>
            </div>
        </div>

        <div class="robot-area">
            <button class="robot-btn" id="btn" aria-label="Napi üzenet">
                <div class="robot" id="robot">
                    <!-- Öltözék -->
                    <span class="outfit outfit-hat" id="outfitHat"></span>
                    <span class="outfit outfit-face" id="outfitFace"></span>
                    <span class="outfit outfit-neck" id="outfitNeck"></span>
                    <!-- Antenna -->
                    <div class="antenna-stick"></div>
                    <div class="antenna-ball"></div>

                    <!-- Fülek -->
                    <div class="ear ear-l"></div>
                    <div class="ear ear-r"></div>

                    <!-- Fej -->
                    <div class="head">
                        <div class="face-screen">
                            <div class="eyes">
                                <div class="eye"></div>
                                <div class="eye"></div>
                            </div>
                            <div class="mouth"></div>
                        </div>
                    </div>

                    <!-- Nyak -->
                    <div class="neck"></div>

                    <!-- Vállak -->
                    <div class="shoulder shoulder-l"></div>
                    <div class="shoulder shoulder-r"></div>

                    <!-- Karok -->
                    <div class="arm arm-l"></div>
                    <div class="arm arm-r"></div>

                    <!-- Törzs -->
                    <div class="torso">
                        <div class="chest">
                            <span class="heart-icon">❤️</span>
                            <div class="chest-dots">
                                <span class="chest-dot"></span>
                                <span class="chest-dot"></span>
                                <span class="chest-dot"></span>
                            </div>
                        </div>
                    </div>

                    <!-- Lábak -->
                    <div class="legs">
                        <div class="leg"><div class="foot"></div></div>
                        <div class="leg"><div class="foot"></div></div>
                    </div>
                </div>
            </button>
        </div>

        <div class="next-msg" id="nextMsg"></div>
    </div>

    <div class="cfx" id="cfx"></div>

    <script>
        // Csillagok
        (function(){const c=document.getElementById('stars');for(let i=0;i<20;i++){const s=document.createElement('span');s.className='star';s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;--s:${Math.random()*12+8}px;--d:${(Math.random()*3+2).toFixed(1)}s`;c.appendChild(s)}})();

        // ========== KOVRAT NAP DETEKTÁLÁS ==========
        const _now=new Date();
        const isKovratDay=(_now.getMonth()===2&&_now.getDate()===28); // márc 28.

        // ========== NAPSZAK HÁTTÉR ==========
        (function(){
            if(isKovratDay){
                const bg='linear-gradient(165deg,#fda4af 0%,#fb7185 25%,#f43f5e 50%,#e11d48 75%,#be123c 100%)';
                document.documentElement.style.background=bg;
                document.body.style.background=bg;
                // Lebegő szívek
                const hearts=['❤️','💕','💖','💗','💝','💘','🩷','♥️'];
                const wl=document.getElementById('weatherLayer');
                for(let i=0;i<30;i++){
                    const h=document.createElement('div');h.className='love-heart';
                    h.textContent=hearts[Math.floor(Math.random()*hearts.length)];
                    h.style.cssText=`--x:${Math.random()*100}%;--sz:${(Math.random()*20+14).toFixed(0)}px;--d:${(Math.random()*5+4).toFixed(1)}s;--sx:${(Math.random()*80-40).toFixed(0)}px;animation-delay:${(Math.random()*-8).toFixed(1)}s`;
                    wl.appendChild(h);
                }
                return;
            }
            const h=new Date().getHours();
            let bg;
            if(h>=5&&h<8) bg='linear-gradient(165deg,#fed7aa 0%,#fdba74 20%,#fb923c 40%,#f97316 60%,#ea580c 80%,#c2410c 100%)'; // reggel
            else if(h>=8&&h<17) bg='linear-gradient(165deg,#38bdf8 0%,#818cf8 30%,#a855f7 55%,#ec4899 80%,#f97316 100%)'; // nappal
            else if(h>=17&&h<20) bg='linear-gradient(165deg,#f97316 0%,#ec4899 25%,#a855f7 50%,#7c3aed 75%,#4c1d95 100%)'; // este
            else bg='linear-gradient(165deg,#0f172a 0%,#1e1b4b 30%,#312e81 55%,#1e1b4b 80%,#0f172a 100%)'; // éjjel
            document.documentElement.style.background=bg;
            document.body.style.background=bg;
        })();

        // ========== ROBOT ÖLTÖZÉKEK ==========
        (function(){
            const d=new Date(), month=d.getMonth(), day=d.getDate(), dow=d.getDay();
            const seed=(d.getFullYear()*10000+(month+1)*100+day);

        const btn=document.getElementById('btn'),bubble=document.getElementById('bubble'),ph=document.getElementById('ph'),cfx=document.getElementById('cfx');
        let done=false;
        const td=()=>new Date().toDateString();

        // Egyedi user ID — minden felhasználó más üzenetet kap
        function getUid(){
            let u=localStorage.getItem('nu_uid');
            if(!u){u=Math.floor(Math.random()*100000).toString();localStorage.setItem('nu_uid',u)}
            return parseInt(u);
        }
        const uid=getUid();

        function dm(){
            const d=new Date();
            // Április 1. speciális üzenet
            if(d.getMonth()===3 && d.getDate()===1){
                return {t:"Az admin azt üzeni hogy legyen szép napod!",e:"😄"};
            }
            const s=d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate()+uid;
            return M[s%M.length];
        }

        document.getElementById('date').textContent=new Date().toLocaleDateString('hu-HU',{year:'numeric',month:'long',day:'numeric',weekday:'long'});

        // Streak
        (function(){const t=td(),l=localStorage.getItem('nu_l');let s=parseInt(localStorage.getItem('nu_s')||'0');if(l!==t){const y=new Date();y.setDate(y.getDate()-1);s=l===y.toDateString()?s+1:1;localStorage.setItem('nu_l',t);localStorage.setItem('nu_s',s.toString())}if(s>1){document.getElementById('streak').classList.add('on');document.getElementById('sn').textContent=s}})();

        function seen(){return localStorage.getItem('nu_d')===td()}
        function mark(){localStorage.setItem('nu_d',td())}

        // Hang effekt (iOS-en is működik, vibrate nem)
        let audioCtx=null;
        function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}
        function tickSound(){
            if(!audioCtx)return;
            const o=audioCtx.createOscillator(),g=audioCtx.createGain();
            o.connect(g);g.connect(audioCtx.destination);
            o.frequency.value=800+Math.random()*400;
            g.gain.value=0.03;
            g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.04);
            o.start();o.stop(audioCtx.currentTime+0.04);
        }
        function doneSound(){
            if(!audioCtx)return;
            [0,80,160].forEach((delay,i)=>{
                setTimeout(()=>{
                    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
                    o.connect(g);g.connect(audioCtx.destination);
                    o.frequency.value=[900,1100,1400][i];
                    g.gain.value=0.05;
                    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.1);
                    o.start();o.stop(audioCtx.currentTime+0.1);
                },delay);
            });
        }

        // Gépelő effekt hanggal
        function typeText(el,text,cb){
            el.innerHTML='';
            let i=0;
            const cursor=document.createElement('span');
            cursor.className='cursor';
            el.appendChild(cursor);

            function tick(){
                if(i<text.length){
                    el.insertBefore(document.createTextNode(text[i]),cursor);
                    if(i%2===0){tickSound();if(navigator.vibrate)navigator.vibrate(15)}
                    i++;
                    setTimeout(tick, 30 + Math.random()*25);
                } else {
                    doneSound();
                    if(navigator.vibrate)navigator.vibrate([50,30,50]);
                    setTimeout(()=>{cursor.remove();if(cb)cb()},500);
                }
            }
            tick();
        }

        // Reakció az üzenet hangulata alapján
        function pickReaction(m){
            const t=m.t.toLowerCase();
            if(m.e==='😂'||m.e==='😁'||m.e==='🐧'||m.e==='🍕'||m.e==='🐱'||m.e==='💃'||m.e==='🎬'||m.e==='😄'||t.includes('nevess')||t.includes('tánc')||t.includes('vicces')) return 'dancing';
            if(m.e==='💧'||m.e==='🧸'||m.e==='🤗'||m.e==='🫂'||m.e==='🩹'||t.includes('szomorú')||t.includes('sírni')||t.includes('ölelés')||t.includes('egyedül')||t.includes('fájdal')) return 'caring';
            if(m.e==='🔎'||m.e==='🧐'||m.e==='💡'||m.e==='🔮'||m.e==='🧭'||t.includes('gondolj')||t.includes('kérdezd')||t.includes('tanulj')) return 'thinking';
            if(m.e==='⚡'||m.e==='🚀'||m.e==='🔥'||m.e==='💪'||m.e==='🏆'||m.e==='💯'||t.includes('csináld')||t.includes('ugorj')||t.includes('add bele')) return 'excited';
            return 'happy';
        }

            const m=isKovratDay?{t:"Kovrat üzeni: Szép napot mindenkinek! ❤️",e:"💖"}:dm();
            document.getElementById('bE').textContent=m.e;
            ph.classList.add('hide');
            const reaction=pickReaction(m);

            if(anim){
                initAudio();
                btn.classList.add('talking');
                setTimeout(()=>bubble.classList.add('show'),200);
                setTimeout(()=>{
                    typeText(document.getElementById('bT'),m.t,()=>{

                    });
                },500);
                boom();mark();updateCountdown();

                document.getElementById('bT').textContent=m.t;
                bubble.classList.add('show');
                btn.classList.add(reaction);
            }
            done=true;
        }

        function boom(){
            const cols=['#fff','#fde68a','#fbbf24','#818cf8','#a855f7','#ec4899','#38bdf8','#34d399'];
            const r=btn.getBoundingClientRect();
            const cx=r.left+r.width/2,cy=r.top+r.height/3;
            for(let i=0;i<50;i++){
                const el=document.createElement('div');el.className='cf';
                const sz=Math.random()*10+4,col=cols[Math.floor(Math.random()*cols.length)];
                const x=(Math.random()-.5)*400,y=(Math.random()-.8)*400,rot=(Math.random()-.5)*720;
                el.style.cssText=`width:${sz}px;height:${sz}px;background:${col};left:${cx}px;top:${cy}px;--x:${x}px;--y:${y}px;--r:${rot}deg;border-radius:${Math.random()>.5?'50%':'3px'}`;
                cfx.appendChild(el);setTimeout(()=>el.remove(),1200);
            }
        }

            btn.classList.add('tap-wave');
            btn.classList.add('talking');

            // Cuki robot hang — "bi-bu-bí-bú-bíp!"
            if(audioCtx){
                const notes=[
                    {f:500,t:0,d:.15,type:'sine'},
                    {f:350,t:.16,d:.15,type:'sine'},
                    {f:700,t:.32,d:.12,type:'triangle'},
                    {f:450,t:.45,d:.1,type:'sine'},
                    {f:900,t:.56,d:.2,type:'triangle'},
                    {f:1100,t:.7,d:.12,type:'sine'},
                    {f:800,t:.82,d:.25,type:'triangle'},
                ];
                notes.forEach(n=>{
                    setTimeout(()=>{
                        const o=audioCtx.createOscillator(),g=audioCtx.createGain();
                        o.connect(g);g.connect(audioCtx.destination);
                        o.frequency.value=n.f;
                        o.type=n.type;
                        g.gain.value=0.07;
                        g.gain.linearRampToValueAtTime(0.08,audioCtx.currentTime+n.d*0.3);
                        g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+n.d);
                        o.start();o.stop(audioCtx.currentTime+n.d);
                    },n.t*1000);
                });
            }

            // Buborékban "Hello!" megjelenik
            const bE=document.getElementById('bE');
            const bT=document.getElementById('bT');
            const oldE=bE.textContent, oldT=bT.textContent;
            bE.textContent='👋';
            bT.textContent='';
            bubble.classList.add('show');

            // "Hello!" gépelés
            typeText(bT,'Hello!',()=>{
                btn.classList.remove('talking');
                // 1.5 mp múlva visszaáll az eredeti üzenetre
                setTimeout(()=>{
                    bE.textContent=oldE;
                    bT.textContent=oldT;
                    btn.classList.remove('tap-wave');
                    tapBusy=false;
                },1500);
            });

            if(navigator.vibrate)navigator.vibrate(30);
        }

        // ========== DRAG (húzd meg a robotot) ==========
        let isDragging=false, dragStartX=0, dragStartY=0, hasMoved=false;
        const robotEl=document.getElementById('robot');

        btn.addEventListener('touchstart',e=>{
            const t=e.touches[0];
            dragStartX=t.clientX;dragStartY=t.clientY;
            hasMoved=false;
        },{passive:true});

        btn.addEventListener('touchmove',e=>{
            if(tapBusy)return;
            const t=e.touches[0];
            const dx=t.clientX-dragStartX, dy=t.clientY-dragStartY;
            if(!isDragging&&(Math.abs(dx)>10||Math.abs(dy)>10)){
                isDragging=true;hasMoved=true;
                btn.classList.add('dragging');
            }
            if(isDragging){
                // Robot pozíció limitálva
                const mx=Math.max(-80,Math.min(80,dx));
                const my=Math.max(-80,Math.min(80,dy));
                robotEl.style.transform=`translate(${mx}px,${my}px)`;
                // Szemek követik az ujjat
                const rot=Math.atan2(dy,dx)*180/Math.PI;
                robotEl.style.filter=`drop-shadow(0 20px 30px rgba(0,0,0,.3)) hue-rotate(${rot}deg)`;
            }
        },{passive:true});

        btn.addEventListener('touchend',()=>{
            if(isDragging){
                isDragging=false;
                btn.classList.remove('dragging');
                // Visszapattanás
                robotEl.style.transition='transform .4s cubic-bezier(.34,1.56,.64,1), filter .4s ease';
                robotEl.style.transform='';
                robotEl.style.filter='';
                setTimeout(()=>{robotEl.style.transition='';},500);
            }
        },{passive:true});

        btn.addEventListener('click',e=>{
            if(hasMoved){hasMoved=false;return}
            if(!done&&!seen()){show(true)}
            else if(done){playTapReaction()}
        });
        if(seen())show(false);

        // ========== VISSZASZÁMLÁLÓ ==========
        const nextMsgEl=document.getElementById('nextMsg');
        function updateCountdown(){
            if(!seen()){nextMsgEl.textContent='';return}
            const now=new Date();
            const tomorrow8=new Date(now);
            tomorrow8.setDate(tomorrow8.getDate()+1);
            tomorrow8.setHours(8,0,0,0);
            const diff=tomorrow8-now;
            const h=Math.floor(diff/3600000);
            const m=Math.floor((diff%3600000)/60000);
            const s=Math.floor((diff%60000)/1000);
            nextMsgEl.textContent=`🕐 Következő üzenet: ${h} óra ${m} perc ${s} mp múlva`;
        }
        updateCountdown();
        setInterval(updateCountdown,1000);

        // ========== Service Worker + Értesítések ==========
        if('serviceWorker' in navigator){
            navigator.serviceWorker.register('sw.js').then(reg=>{
                // Értesítés engedély kérés első koppintáskor
                btn.addEventListener('click',function askNotif(){
                    if('Notification' in window && Notification.permission==='default'){
                        Notification.requestPermission().then(p=>{
                            if(p==='granted') startNotifications(reg);
                        });
                    }
                    btn.removeEventListener('click',askNotif);
                },{once:true});

                // Ha már engedélyezve van — rögtön indít
                if('Notification' in window && Notification.permission==='granted'){
                    startNotifications(reg);
                }
            });
        }

        function startNotifications(reg){
            // 1) Service worker-nek szólunk: ütemezze a 8 órás értesítést
            if(reg.active) reg.active.postMessage({type:'schedule'});

            // 2) Azonnal ellenőrizzük: ha 8 óra után vagyunk és ma még nem volt értesítés
            if(reg.active) reg.active.postMessage({type:'check-notify'});

            // 3) Periodic Background Sync regisztráció (Android Chrome)
            if('periodicSync' in reg){
                reg.periodicSync.register('daily-notification',{minInterval:24*60*60*1000}).catch(()=>{});
            }

            // 4) Ha az app visszatér az előtérbe (pl. feloldod a telefont) → ellenőriz
            document.addEventListener('visibilitychange',function(){
                if(document.visibilityState==='visible' && reg.active){
                    reg.active.postMessage({type:'check-notify'});
                }
            });
        }
    </script>
</body>
</html>
