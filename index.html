<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DailyBot">
    <meta name="theme-color" content="#38bdf8" id="themeColor">
    <link rel="apple-touch-icon" href="icon/dailybot-icon.png">
    <link rel="manifest" href="manifest.json">
    <title>DailyBot</title>
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
        html{background-color:#f97316;min-height:100%;min-height:100dvh;min-height:-webkit-fill-available}
        body{width:100%;height:100%;min-height:100dvh;min-height:-webkit-fill-available;overflow:hidden;touch-action:manipulation;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
            background: linear-gradient(165deg, #38bdf8 0%, #818cf8 30%, #a855f7 55%, #ec4899 80%, #f97316 100%);
            background-attachment:fixed;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
        .star{position:absolute;width:0;height:0}
        .star::before{content:'✦';color:rgba(255,255,255,0.6);font-size:var(--s);position:absolute;animation:twinkle var(--d) ease-in-out infinite}
        @keyframes twinkle{0%,100%{opacity:.2;transform:scale(.7)}50%{opacity:1;transform:scale(1.3)}}

        .app {
            position:relative;z-index:1;
            display:flex;flex-direction:column;align-items:center;
            width:100%;max-width:400px;
            height:100dvh;height:100vh;
            padding:16px 20px;
            padding-top:calc(env(safe-area-inset-top, 20px) + 28px);
            padding-bottom:calc(env(safe-area-inset-bottom, 0px) + 8px);
            justify-content:space-between;
        }

        /* FEJLÉC */
        .top{text-align:center;flex-shrink:0}
        .top h1{font-size:24px;font-weight:800;color:#fff;text-shadow:0 2px 12px rgba(0,0,0,.2)}
        .date{font-size:13px;color:rgba(255,255,255,.7);margin-top:3px;font-weight:500}
        .streak{display:none;margin-top:8px;padding:4px 14px;border-radius:100px;background:rgba(255,255,255,.18);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);color:#fff;font-size:13px;font-weight:600;border:1px solid rgba(255,255,255,.2)}
        .streak.on{display:inline-block}

        /* KÖVETKEZŐ ÜZENET VISSZASZÁMLÁLÓ */
        .next-msg{text-align:center;flex-shrink:0;min-height:20px;padding:4px 0;color:rgba(255,255,255,.65);font-size:12px;font-weight:500;letter-spacing:.3px}

        /* BUBORÉK */
        .bubble-wrap{width:100%;min-height:80px;display:flex;align-items:flex-end;justify-content:center;flex-shrink:0;padding-bottom:10px}
        .bubble{
            position:relative;width:100%;
            background:rgba(255,255,255,.15);
            backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
            border:1.5px solid rgba(255,255,255,.3);
            border-radius:22px;padding:22px 20px 26px;text-align:center;
            box-shadow:0 10px 35px rgba(0,0,0,.12),inset 0 1px 0 rgba(255,255,255,.3);
            opacity:0;transform:scale(.4) translateY(20px);pointer-events:none;
            transition:all .5s cubic-bezier(.34,1.56,.64,1);
        }
        .bubble.show{opacity:1;transform:scale(1) translateY(0);pointer-events:auto}
        .bubble::after{content:'';position:absolute;bottom:-14px;left:50%;transform:translateX(-50%);border-left:13px solid transparent;border-right:13px solid transparent;border-top:16px solid rgba(255,255,255,.15)}
        .bubble-heart{position:absolute;top:-12px;right:-6px;font-size:26px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.15));opacity:0;transform:scale(0);transition:all .4s cubic-bezier(.34,1.56,.64,1) .3s}
        .bubble.show .bubble-heart{opacity:1;transform:scale(1) rotate(-12deg)}
        .b-emoji{font-size:34px;display:block;margin-bottom:10px}
        .b-text{font-size:17px;line-height:1.55;color:#fff;font-weight:600;min-height:52px;text-shadow:0 1px 6px rgba(0,0,0,.2)}
        .cursor{display:inline-block;width:2px;height:18px;background:#fff;margin-left:2px;vertical-align:text-bottom;animation:blink .6s step-end infinite}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
        .fav-btn{
            padding:8px 20px;
            background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.25);
            border-radius:100px;color:#fff;font-size:14px;font-weight:600;
            cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;
        }
        .fav-btn:active{transform:scale(.95)}
        .fav-btn.saved{background:rgba(239,68,68,.25);border-color:rgba(239,68,68,.4)}
        .bubble-actions{display:none;gap:8px;margin-top:14px;justify-content:center}
        .bubble.show .bubble-actions{display:flex}
        .share-btn{
            padding:8px 20px;
            background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.25);
            border-radius:100px;color:#fff;font-size:14px;font-weight:600;
            cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;
        }
        .share-btn:active{transform:scale(.95)}
        .share-btn.copied{background:rgba(34,197,94,.25);border-color:rgba(34,197,94,.4)}

        /* Kedvencek lista */
        .favs-toggle{
            position:fixed;top:calc(env(safe-area-inset-top,20px) + 12px);right:16px;z-index:50;
            background:rgba(255,255,255,.15);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
            border:1px solid rgba(255,255,255,.2);border-radius:50%;
            width:40px;height:40px;display:none;align-items:center;justify-content:center;
            font-size:20px;cursor:pointer;-webkit-tap-highlight-color:transparent;
        }
        .favs-toggle.has{display:flex}
        .favs-badge{position:absolute;top:-2px;right:-2px;width:16px;height:16px;border-radius:50%;background:#ef4444;color:#fff;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center}

        .favs-panel{
            position:fixed;inset:0;z-index:100;
            background:rgba(0,0,0,.6);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
            display:none;align-items:center;justify-content:center;padding:20px;
        }
        .favs-panel.open{display:flex}
        .favs-card{
            width:100%;max-width:380px;max-height:75vh;
            background:rgba(255,255,255,.12);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
            border:1.5px solid rgba(255,255,255,.25);border-radius:24px;
            padding:24px 20px;overflow-y:auto;
            animation:obIn .4s cubic-bezier(.34,1.56,.64,1);
        }
        .favs-title{color:#fff;font-size:20px;font-weight:800;text-align:center;margin-bottom:16px;text-shadow:0 2px 8px rgba(0,0,0,.2)}
        .favs-empty{color:rgba(255,255,255,.5);text-align:center;font-size:14px;padding:20px 0}
        .fav-item{
            display:flex;align-items:flex-start;gap:10px;
            padding:12px;margin-bottom:8px;
            background:rgba(255,255,255,.08);border-radius:14px;
            border:1px solid rgba(255,255,255,.1);
        }
        .fav-item-emoji{font-size:24px;flex-shrink:0}
        .fav-item-text{color:#fff;font-size:14px;line-height:1.5;font-weight:500;flex:1}
        .fav-item-date{color:rgba(255,255,255,.4);font-size:11px;margin-top:4px}
        .fav-item-del{background:none;border:none;font-size:16px;cursor:pointer;padding:4px;opacity:.5;flex-shrink:0}
        .fav-item-del:active{opacity:1}
        .favs-close{
            display:block;width:100%;margin-top:14px;padding:12px;
            background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);
            border-radius:12px;color:#fff;font-size:15px;font-weight:600;
            cursor:pointer;text-align:center;-webkit-tap-highlight-color:transparent;
        }
        .favs-close:active{background:rgba(255,255,255,.25)}

        /* PLACEHOLDER */
        .ph{text-align:center;position:absolute;transition:opacity .3s}
        .ph.hide{opacity:0;pointer-events:none}
        .ph p{color:rgba(255,255,255,.7);font-size:16px;font-weight:600;line-height:1.5}
        .ph .arr{display:inline-block;margin-top:10px;font-size:28px;animation:bob 1.3s ease-in-out infinite}
        @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(10px)}}

        /* ===== ROBOT ===== */
        .robot-area{flex:1;display:flex;align-items:center;justify-content:center;min-height:0;width:100%}
        .robot-btn{background:none;border:none;cursor:pointer;padding:0;outline:none;-webkit-tap-highlight-color:transparent}
        .robot-btn:active .robot{transform:scale(.95)}

        .robot{
            width:200px;height:280px;position:relative;
            transition:transform .15s ease;
            animation:float 3s ease-in-out infinite;
            filter:drop-shadow(0 20px 30px rgba(0,0,0,.2));
        }
        @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

        /* Antenna */
        .antenna-stick{position:absolute;top:0;left:50%;transform:translateX(-50%);width:4px;height:28px;background:linear-gradient(to bottom,#94a3b8,#cbd5e1);border-radius:2px}
        .antenna-ball{position:absolute;top:-8px;left:50%;transform:translateX(-50%);width:16px;height:16px;background:radial-gradient(circle at 40% 35%,#fde68a,#f59e0b);border-radius:50%;box-shadow:0 0 12px rgba(251,191,36,.6);animation:glow 2s ease-in-out infinite}
        @keyframes glow{0%,100%{box-shadow:0 0 8px rgba(251,191,36,.4)}50%{box-shadow:0 0 24px rgba(251,191,36,.9),0 0 48px rgba(251,191,36,.3)}}

        /* Fej */
        .head{
            position:absolute;top:26px;left:50%;transform:translateX(-50%);
            width:130px;height:110px;
            background:linear-gradient(165deg,#f1f5f9 0%,#e2e8f0 40%,#cbd5e1 100%);
            border-radius:40px 40px 32px 32px;
            box-shadow:0 4px 15px rgba(0,0,0,.1),inset 0 2px 0 rgba(255,255,255,.8),inset 0 -2px 4px rgba(0,0,0,.05);
            overflow:hidden;
        }

        /* Arc kijelző */
        .face-screen{
            position:absolute;top:18px;left:14px;right:14px;bottom:18px;
            background:linear-gradient(180deg,#0f172a,#1e293b);
            border-radius:24px;
            box-shadow:inset 0 2px 8px rgba(0,0,0,.5),0 1px 0 rgba(255,255,255,.15);
            overflow:hidden;
        }
        .face-screen::before{content:'';position:absolute;top:0;left:20%;width:60%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent)}

        /* Szemek */
        .eyes{display:flex;justify-content:center;gap:26px;padding-top:20px;position:relative;z-index:2}
        .eye{
            width:24px;height:24px;
            background:radial-gradient(circle at 50% 50%,#7dd3fc,#38bdf8,#0284c7);
            border-radius:50%;
            box-shadow:0 0 10px rgba(56,189,248,.6),0 0 20px rgba(56,189,248,.3);
            position:relative;
            animation:eyeIdle 4s ease-in-out infinite;
        }
        .eye::after{content:'';position:absolute;top:3px;left:5px;width:7px;height:7px;background:rgba(255,255,255,.7);border-radius:50%}

        @keyframes eyeIdle{0%,90%,100%{transform:scaleY(1)}95%{transform:scaleY(.1)}}

        /* Beszéd közben szemek */
        .robot-btn.talking .eye{
            animation:none;
            box-shadow:0 0 14px rgba(56,189,248,.8),0 0 28px rgba(56,189,248,.4);
        }

        /* Száj */
        .mouth{
            width:28px;height:3px;
            background:#38bdf8;
            border-radius:3px;
            margin:14px auto 0;
            box-shadow:0 0 8px rgba(56,189,248,.5);
            transition:all .3s ease;
        }
        .robot-btn.talking .mouth{
            width:20px;height:14px;
            border-radius:50%;
            background:transparent;
            border:2px solid #38bdf8;
            animation:speak .3s ease infinite;
        }
        @keyframes speak{0%,100%{transform:scaleY(1)}50%{transform:scaleY(.5)}}

        /* happy alapstílusok az új reakció blokkban vannak */

        /* Fül */
        .ear{
            position:absolute;top:50px;
            width:14px;height:24px;
            background:linear-gradient(to bottom,#e2e8f0,#cbd5e1);
            border-radius:6px;
            box-shadow:0 2px 4px rgba(0,0,0,.1);
        }
        .ear-l{left:22px}.ear-r{right:22px}
        .ear::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:6px;height:6px;border-radius:50%;background:#94a3b8}

        /* Nyak */
        .neck{position:absolute;top:134px;left:50%;transform:translateX(-50%);width:30px;height:16px;background:linear-gradient(to bottom,#cbd5e1,#94a3b8);border-radius:4px}
        .neck::before,.neck::after{content:'';position:absolute;width:24px;height:3px;background:#94a3b8;border-radius:2px;left:50%;transform:translateX(-50%)}
        .neck::before{top:3px}.neck::after{bottom:3px}

        /* Törzs */
        .torso{
            position:absolute;top:148px;left:50%;transform:translateX(-50%);
            width:120px;height:90px;
            background:linear-gradient(165deg,#f1f5f9 0%,#e2e8f0 50%,#cbd5e1 100%);
            border-radius:20px 20px 24px 24px;
            box-shadow:0 6px 20px rgba(0,0,0,.1),inset 0 2px 0 rgba(255,255,255,.6);
        }

        /* Mellkas panel */
        .chest{
            position:absolute;top:12px;left:50%;transform:translateX(-50%);
            width:56px;height:56px;
            background:linear-gradient(145deg,#0f172a,#1e293b);
            border-radius:14px;
            box-shadow:inset 0 2px 6px rgba(0,0,0,.5),0 1px 0 rgba(255,255,255,.1);
            display:flex;align-items:center;justify-content:center;
            overflow:hidden;
        }
        .chest::before{content:'';position:absolute;inset:2px;border-radius:12px;border:1px solid rgba(56,189,248,.15)}
        .heart-icon{font-size:24px;animation:heartbeat 1.5s ease infinite;position:relative;z-index:1}
        @keyframes heartbeat{0%,100%{transform:scale(1)}15%{transform:scale(1.25)}30%{transform:scale(1)}}

        .robot-btn.talking .heart-icon{animation:heartbeat .6s ease infinite}

        /* Mellkas fények */
        .chest-dots{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);display:flex;gap:4px}
        .chest-dot{width:4px;height:4px;border-radius:50%;background:#38bdf8;opacity:.4}
        .robot-btn.talking .chest-dot{animation:dotPulse .8s ease infinite}
        .chest-dot:nth-child(2){animation-delay:.15s!important}
        .chest-dot:nth-child(3){animation-delay:.3s!important}
        @keyframes dotPulse{0%,100%{opacity:.3}50%{opacity:1;box-shadow:0 0 6px rgba(56,189,248,.8)}}

        /* Karok */
        .arm{
            position:absolute;top:155px;
            width:24px;height:70px;
            background:linear-gradient(to bottom,#e2e8f0,#cbd5e1);
            border-radius:12px;
            transform-origin:top center;
            box-shadow:0 4px 8px rgba(0,0,0,.08);
        }
        .arm-l{left:18px;transform:rotate(6deg)}.arm-r{right:18px;transform:rotate(-6deg)}
        .arm::after{content:'';position:absolute;bottom:-2px;left:50%;transform:translateX(-50%);width:20px;height:16px;background:linear-gradient(to bottom,#cbd5e1,#94a3b8);border-radius:0 0 10px 10px}

        .robot-btn.talking .arm-l{animation:waveL 1s ease infinite}
        .robot-btn.talking .arm-r{animation:waveR 1s ease infinite}
        .robot-btn.happy .arm-l{transform:rotate(-25deg)}
        .robot-btn.happy .arm-r{transform:rotate(25deg)}
        @keyframes waveL{0%,100%{transform:rotate(6deg)}50%{transform:rotate(-10deg)}}
        @keyframes waveR{0%,100%{transform:rotate(-6deg)}50%{transform:rotate(10deg)}}

        /* Vállpánt */
        .shoulder{position:absolute;top:150px;width:12px;height:12px;background:#cbd5e1;border-radius:50%;box-shadow:inset 0 1px 2px rgba(0,0,0,.15)}
        .shoulder-l{left:26px}.shoulder-r{right:26px}

        /* Lábak */
        .legs{position:absolute;bottom:0;left:50%;transform:translateX(-50%);display:flex;gap:16px}
        .leg{width:28px;height:36px;background:linear-gradient(to bottom,#cbd5e1,#94a3b8);border-radius:8px 8px 12px 12px;box-shadow:0 4px 8px rgba(0,0,0,.1)}
        .foot{position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:36px;height:10px;background:linear-gradient(to bottom,#94a3b8,#64748b);border-radius:0 0 8px 8px}


        /* ===== ROBOT REAKCIÓK ===== */

        /* EXCITED — izgatott ugrálás, tapsolás, ragyogó szemek */
        .robot-btn.excited .robot{animation:excitedBounce .5s cubic-bezier(.36,1.4,.5,1) infinite}
        @keyframes excitedBounce{0%,100%{transform:translateY(0) scale(1)}30%{transform:translateY(-20px) scale(1.05)}60%{transform:translateY(-5px) scale(.98)}}
        .robot-btn.excited .eye{
            animation:excitedEye .6s ease infinite;
            background:radial-gradient(circle,#fff,#67e8f9,#06b6d4);
            box-shadow:0 0 20px rgba(6,182,212,.9),0 0 40px rgba(6,182,212,.4),0 0 60px rgba(6,182,212,.2);
        }
        @keyframes excitedEye{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}
        .robot-btn.excited .antenna-ball{
            animation:excitedAntenna .3s ease-in-out infinite;
            box-shadow:0 0 20px rgba(251,191,36,.9),0 0 40px rgba(251,191,36,.5);
        }
        @keyframes excitedAntenna{0%,100%{transform:translateX(-50%) scale(1)}50%{transform:translateX(-50%) scale(1.4)}}
        .robot-btn.excited .arm-l{animation:excitedArmL .25s ease infinite;transform-origin:top center}
        .robot-btn.excited .arm-r{animation:excitedArmR .25s ease infinite;transform-origin:top center}
        @keyframes excitedArmL{0%{transform:rotate(-40deg)}50%{transform:rotate(15deg)}100%{transform:rotate(-40deg)}}
        @keyframes excitedArmR{0%{transform:rotate(40deg)}50%{transform:rotate(-15deg)}100%{transform:rotate(40deg)}}
        .robot-btn.excited .mouth{
            width:24px;height:12px;background:transparent;
            border-bottom:3px solid #22d3ee;border-radius:0 0 50% 50%;
            box-shadow:0 4px 12px rgba(34,211,238,.5);animation:none;border-top:none;border-left:none;border-right:none;
        }
        .robot-btn.excited .heart-icon{animation:heartbeat .3s ease infinite}
        .robot-btn.excited .chest-dot{animation:dotPulse .3s ease infinite}
        .robot-btn.excited .leg{animation:excitedLeg .5s ease infinite}
        .robot-btn.excited .leg:nth-child(2){animation-delay:.25s}
        @keyframes excitedLeg{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}

        /* CARING — gyengéd ringás, lila fény, ölelő karok */
        .robot-btn.caring .robot{animation:caringFloat 3s ease-in-out infinite}
        @keyframes caringFloat{0%,100%{transform:translateY(0) rotate(-2deg)}25%{transform:translateY(-6px) rotate(0deg)}50%{transform:translateY(-3px) rotate(2deg)}75%{transform:translateY(-8px) rotate(0deg)}}
        .robot-btn.caring .eye{
            animation:caringEye 3s ease-in-out infinite;
            background:radial-gradient(circle,#e9d5ff,#c084fc,#9333ea);
            box-shadow:0 0 16px rgba(147,51,234,.7),0 0 32px rgba(147,51,234,.3);
        }
        @keyframes caringEye{0%,100%{transform:scaleY(1)}40%{transform:scaleY(1)}45%{transform:scaleY(.3)}50%{transform:scaleY(1)}90%{transform:scaleY(1)}95%{transform:scaleY(.3)}}
        .robot-btn.caring .mouth{
            width:20px;height:10px;background:transparent;
            border-bottom:3px solid #c084fc;border-radius:0 0 50% 50%;
            box-shadow:0 3px 8px rgba(192,132,252,.4);animation:none;border-top:none;border-left:none;border-right:none;
        }
        .robot-btn.caring .arm-l{animation:caringArmL 2s ease-in-out infinite;transform-origin:top center}
        .robot-btn.caring .arm-r{animation:caringArmR 2s ease-in-out infinite;transform-origin:top center}
        @keyframes caringArmL{0%,100%{transform:rotate(6deg)}50%{transform:rotate(-20deg)}}
        @keyframes caringArmR{0%,100%{transform:rotate(-6deg)}50%{transform:rotate(20deg)}}
        .robot-btn.caring .heart-icon{animation:caringHeart 1.5s ease infinite}
        @keyframes caringHeart{0%,100%{transform:scale(1)}25%{transform:scale(1.3)}50%{transform:scale(1)}75%{transform:scale(1.15)}}
        .robot-btn.caring .antenna-ball{
            background:radial-gradient(circle at 40% 35%,#e9d5ff,#a855f7);
            box-shadow:0 0 16px rgba(168,85,247,.7),0 0 32px rgba(168,85,247,.3);
            animation:caringGlow 2s ease-in-out infinite;
        }
        @keyframes caringGlow{0%,100%{box-shadow:0 0 10px rgba(168,85,247,.4)}50%{box-shadow:0 0 28px rgba(168,85,247,.9),0 0 50px rgba(168,85,247,.3)}}
        .robot-btn.caring .chest-dot{background:#c084fc}

        /* THINKING — fej döntés, szemek keresgélnek, száj "hmm" */
        .robot-btn.thinking .robot{animation:thinkFloat 4s ease-in-out infinite}
        @keyframes thinkFloat{0%,100%{transform:translateY(0) rotate(0deg)}30%{transform:translateY(-5px) rotate(4deg)}60%{transform:translateY(-2px) rotate(-2deg)}}
        .robot-btn.thinking .head{animation:thinkHead 4s ease-in-out infinite}
        @keyframes thinkHead{0%,100%{transform:translateX(-50%) rotate(0deg)}30%{transform:translateX(-50%) rotate(6deg)}70%{transform:translateX(-50%) rotate(-3deg)}}
        .robot-btn.thinking .eye{
            animation:thinkEye 3s ease-in-out infinite;
            background:radial-gradient(circle,#fef9c3,#fbbf24,#d97706);
            box-shadow:0 0 12px rgba(251,191,36,.6),0 0 24px rgba(251,191,36,.3);

        /* DANCING — party mód, teljes test táncol */
        .robot-btn.dancing .robot{animation:danceBody .8s cubic-bezier(.4,0,.2,1) infinite}
        @keyframes danceBody{0%{transform:translateY(0) rotate(-4deg) scaleY(1)}25%{transform:translateY(-14px) rotate(0deg) scaleY(1.03)}50%{transform:translateY(0) rotate(4deg) scaleY(.97)}75%{transform:translateY(-10px) rotate(0deg) scaleY(1.02)}100%{transform:translateY(0) rotate(-4deg) scaleY(1)}}
        .robot-btn.dancing .eye{

        @keyframes discoEye{0%,100%{background:radial-gradient(circle,#fff,#f9a8d4,#ec4899);transform:scale(1)}33%{background:radial-gradient(circle,#fff,#67e8f9,#06b6d4)}66%{background:radial-gradient(circle,#fff,#c4b5fd,#8b5cf6);transform:scale(1.1)}}
        .robot-btn.dancing .mouth{

        .robot-btn.dancing .arm-l{animation:danceArmL .4s cubic-bezier(.4,0,.2,1) infinite;transform-origin:top center}

        @keyframes danceArmL{0%{transform:rotate(-45deg)}50%{transform:rotate(20deg)}100%{transform:rotate(-45deg)}}
        @keyframes danceArmR{0%{transform:rotate(20deg)}50%{transform:rotate(-45deg)}100%{transform:rotate(20deg)}}
        .robot-btn.dancing .leg:first-child{animation:danceLegL .8s ease infinite}
        .robot-btn.dancing .leg:last-child{animation:danceLegR .8s ease infinite}
        @keyframes danceLegL{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-6px) rotate(-8deg)}}
        @keyframes danceLegR{0%,100%{transform:translateY(-6px) rotate(8deg)}50%{transform:translateY(0) rotate(0deg)}}
        .robot-btn.dancing .antenna-ball{
            animation:discoAntenna .4s ease infinite;
        }
        @keyframes discoAntenna{0%,100%{background:radial-gradient(circle,#fde68a,#f59e0b);box-shadow:0 0 20px rgba(251,191,36,.8)}33%{background:radial-gradient(circle,#f9a8d4,#ec4899);box-shadow:0 0 20px rgba(236,72,153,.8)}66%{background:radial-gradient(circle,#c4b5fd,#8b5cf6);box-shadow:0 0 20px rgba(139,92,246,.8)}}
        .robot-btn.dancing .heart-icon{animation:heartbeat .4s ease infinite}
        .robot-btn.dancing .chest-dot{animation:dotPulse .25s ease infinite}
        .robot-btn.dancing .head{animation:danceHead .4s ease infinite}
        @keyframes danceHead{0%,100%{transform:translateX(-50%) rotate(-3deg)}50%{transform:translateX(-50%) rotate(3deg)}}

        /* HAPPY — boldog (alapértelmezett, továbbfejlesztve) */
        .robot-btn.happy .robot{animation:happyFloat 2s ease-in-out infinite}
        @keyframes happyFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
        .robot-btn.happy .mouth{
            width:32px;height:16px;background:transparent;
            border-bottom:3px solid #38bdf8;border-radius:0 0 50% 50%;
            box-shadow:0 4px 10px rgba(56,189,248,.4);border-top:none;border-left:none;border-right:none;

        .robot-btn.happy .arm-r{animation:happyArmR 1.5s ease-in-out infinite;transform-origin:top center}
        @keyframes happyArmL{0%,100%{transform:rotate(-25deg)}50%{transform:rotate(-35deg)}}
        @keyframes happyArmR{0%,100%{transform:rotate(25deg)}50%{transform:rotate(35deg)}}

        /* ===== TAP REAKCIÓK (interaktív) ===== */

        /* Pörgés */
        .robot-btn.tap-spin .robot{animation:tapSpin .6s cubic-bezier(.4,0,.2,1) forwards}
        @keyframes tapSpin{0%{transform:rotate(0deg) scale(1)}50%{transform:rotate(180deg) scale(.9)}100%{transform:rotate(360deg) scale(1)}}

        /* Ugrás */
        .robot-btn.tap-jump .robot{animation:tapJump .5s cubic-bezier(.4,0,.2,1) forwards}
        @keyframes tapJump{0%{transform:translateY(0) scaleY(1)}15%{transform:translateY(4px) scaleY(.85) scaleX(1.1)}40%{transform:translateY(-40px) scaleY(1.1) scaleX(.95)}70%{transform:translateY(0) scaleY(.9)}100%{transform:translateY(0) scaleY(1)}}

        /* Kacsintás */
        .robot-btn.tap-wink .eye:first-child{animation:tapWink .4s ease forwards}

        /* Fejrázás (nem-nem) */
        .robot-btn.tap-shake .head{animation:tapShake .4s ease forwards}
        @keyframes tapShake{0%{transform:translateX(-50%) rotate(0)}20%{transform:translateX(-50%) rotate(8deg)}40%{transform:translateX(-50%) rotate(-8deg)}60%{transform:translateX(-50%) rotate(5deg)}80%{transform:translateX(-50%) rotate(-3deg)}100%{transform:translateX(-50%) rotate(0)}}

        /* Bólintás (igen) */
        .robot-btn.tap-nod .head{animation:tapNod .5s ease forwards}
        @keyframes tapNod{0%{transform:translateX(-50%) rotate(0)}25%{transform:translateX(-50%) rotate(-10deg)}50%{transform:translateX(-50%) rotate(0)}75%{transform:translateX(-50%) rotate(-8deg)}100%{transform:translateX(-50%) rotate(0)}}

        /* Taps (meghajlás) */
        .robot-btn.tap-bow .robot{animation:tapBow .7s ease forwards}
        @keyframes tapBow{0%{transform:rotate(0) translateY(0)}40%{transform:rotate(15deg) translateY(5px)}100%{transform:rotate(0) translateY(0)}}

        /* Wave (integetés) */
        .robot-btn.tap-wave .arm-r{animation:tapWave .6s ease forwards;transform-origin:top center}
        @keyframes tapWave{0%{transform:rotate(-6deg)}15%{transform:rotate(-50deg)}30%{transform:rotate(-30deg)}45%{transform:rotate(-50deg)}60%{transform:rotate(-30deg)}80%{transform:rotate(-50deg)}100%{transform:rotate(-6deg)}}

        /* Szívdobbanás */
        .robot-btn.tap-love .heart-icon{animation:tapLove .6s ease forwards}
        @keyframes tapLove{0%{transform:scale(1)}20%{transform:scale(1.8)}40%{transform:scale(1)}60%{transform:scale(1.5)}100%{transform:scale(1)}}
        .robot-btn.tap-love .eye{animation:tapLoveEye .6s ease forwards}
        @keyframes tapLoveEye{0%,100%{background:radial-gradient(circle,#7dd3fc,#38bdf8,#0284c7)}50%{background:radial-gradient(circle,#fda4af,#fb7185,#e11d48);box-shadow:0 0 16px rgba(225,29,72,.7)}}

        /* ===== FEHÉR NYUSZI MÓD (húsvét) ===== */

        /* Hosszú fehér fülek */
        .robot.bunny .antenna-stick{
            width:16px;height:60px;top:-34px;left:calc(50% - 24px);
            background:linear-gradient(to bottom,#fff,#f8fafc);
            border-radius:24px 24px 8px 8px;transform:rotate(-10deg);
            box-shadow:0 2px 8px rgba(0,0,0,.08);
        }
        .robot.bunny .antenna-stick::after{
            content:'';position:absolute;top:10px;left:3px;width:10px;height:38px;
            background:linear-gradient(to bottom,#fecdd3,#fda4af);border-radius:18px;
        }
        .robot.bunny .antenna-ball{
            width:16px;height:60px;top:-34px;left:calc(50% + 8px);

            box-shadow:0 2px 8px rgba(0,0,0,.08);

        }
        .robot.bunny .antenna-ball::after{
            content:'';position:absolute;top:10px;left:3px;width:10px;height:38px;
            background:linear-gradient(to bottom,#fecdd3,#fda4af);border-radius:18px;
        }
        @keyframes bunnyEarR{0%,100%{transform:rotate(0deg)}30%{transform:rotate(10deg)}60%{transform:rotate(-3deg)}}

        /* Hófehér fej */
        .robot.bunny .head{
            background:linear-gradient(165deg,#ffffff 0%,#f8fafc 40%,#f1f5f9 100%);
            border-radius:46px 46px 36px 36px;
            box-shadow:0 4px 15px rgba(0,0,0,.06),inset 0 2px 0 rgba(255,255,255,1);
        }

        /* Fehér arc kijelző helyett nyuszi arc */
        .robot.bunny .face-screen{
            background:linear-gradient(180deg,#f8fafc,#f1f5f9);
            box-shadow:inset 0 1px 4px rgba(0,0,0,.05);
        }

        /* Piros nyuszi szemek */
        .robot.bunny .eye{
            background:radial-gradient(circle,#fff,#fca5a5,#ef4444)!important;
            box-shadow:0 0 10px rgba(239,68,68,.4),0 0 20px rgba(239,68,68,.15)!important;
        }
        .robot.bunny .eye::after{background:rgba(255,255,255,.8)}

        /* Rózsaszín orr */
        .robot.bunny .mouth{
            width:12px!important;height:10px!important;
            background:radial-gradient(circle,#fecdd3,#fb7185)!important;
            border:none!important;border-radius:50%!important;
            box-shadow:0 2px 6px rgba(251,113,133,.3)!important;
            animation:bunnyNose 2s ease-in-out infinite!important;
            margin-top:12px!important;
        }
        @keyframes bunnyNose{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}

        /* Bajusz */
        .robot.bunny .face-screen::after{
            content:'';position:absolute;bottom:14px;left:50%;transform:translateX(-50%);
            width:70px;height:16px;
            background:
                linear-gradient(170deg,transparent 0%,rgba(0,0,0,.08) 10%,transparent 22%) 0 0/100% 1.5px no-repeat,
                linear-gradient(175deg,transparent 0%,rgba(0,0,0,.08) 10%,transparent 22%) 0 6px/100% 1.5px no-repeat,
                linear-gradient(190deg,transparent 78%,rgba(0,0,0,.08) 90%,transparent 100%) 0 0/100% 1.5px no-repeat,
                linear-gradient(185deg,transparent 78%,rgba(0,0,0,.08) 90%,transparent 100%) 0 6px/100% 1.5px no-repeat;
        }

        /* Hófehér test */
        .robot.bunny .torso{background:linear-gradient(165deg,#ffffff 0%,#f8fafc 50%,#f1f5f9 100%);box-shadow:0 6px 20px rgba(0,0,0,.06)}
        .robot.bunny .neck{background:linear-gradient(to bottom,#f1f5f9,#e2e8f0)}

        /* Fehér karok */
        .robot.bunny .arm{background:linear-gradient(to bottom,#ffffff,#f1f5f9)}
        .robot.bunny .arm::after{background:linear-gradient(to bottom,#f1f5f9,#e2e8f0)}
        .robot.bunny .shoulder{background:#f1f5f9}

        /* Fehér fülek (oldalsó) */
        .robot.bunny .ear{background:linear-gradient(to bottom,#ffffff,#f8fafc)}
        .robot.bunny .ear::after{background:#fecdd3}

        /* Fehér lábak, kerek tappancs */
        .robot.bunny .leg{background:linear-gradient(to bottom,#f8fafc,#f1f5f9)}
        .robot.bunny .foot{
            background:linear-gradient(to bottom,#fecdd3,#fda4af)!important;
            border-radius:50%!important;width:28px!important;height:14px!important;
        }

        /* Mellkas — fehér, rózsaszín szív */
        .robot.bunny .chest{
            background:linear-gradient(145deg,#f8fafc,#f1f5f9);
            box-shadow:inset 0 2px 4px rgba(0,0,0,.05);
        }
        .robot.bunny .chest::before{border-color:rgba(251,113,133,.15)}
        .robot.bunny .chest-dot{background:#fda4af}
        .robot.bunny .heart-icon{font-size:22px}

        /* Pompom farok */
        .robot.bunny .legs::after{
            content:'';position:absolute;top:-12px;right:-22px;
            width:22px;height:22px;
            background:radial-gradient(circle at 40% 40%,#ffffff,#f1f5f9);
            border-radius:50%;
            box-shadow:0 2px 8px rgba(0,0,0,.08),inset 0 -2px 4px rgba(0,0,0,.03);
            animation:bunnyTail 1.5s ease-in-out infinite;
        }
        @keyframes bunnyTail{0%,100%{transform:translateX(0) scale(1)}50%{transform:translateX(5px) scale(1.1)}}

        /* ===== SZÜLINAP MÓD ===== */
        .birthday-balloon{
            position:fixed;font-size:var(--sz);
            animation:floatBalloon var(--d) linear infinite;
            bottom:-40px;left:var(--x);opacity:0;
            pointer-events:none;z-index:0;
        }
        @keyframes floatBalloon{
            0%{transform:translateY(0) translateX(0) rotate(0deg);opacity:0}
            8%{opacity:.8}
            50%{transform:translateY(-50vh) translateX(var(--sx)) rotate(15deg);opacity:.6}
            100%{transform:translateY(-110vh) translateX(calc(var(--sx)*-1)) rotate(-15deg);opacity:0}
        }

        /* ===== DRAG (húzás) ===== */
        .robot-btn.dragging .robot{animation:none!important;transition:none}
        .robot-btn.dragging .robot::before{
            content:'';position:absolute;inset:-20px;border-radius:50%;z-index:-1;
            background:radial-gradient(circle,rgba(239,68,68,.4),rgba(168,85,247,.3),transparent 70%);
            animation:dragGlow .6s ease-in-out infinite alternate!important;
        }
        @keyframes dragGlow{0%{opacity:.6;transform:scale(.9)}100%{opacity:1;transform:scale(1.1)}}
        .robot-btn.dragging .eye{
            animation:none!important;width:28px;height:28px;
            background:radial-gradient(circle,#fff,#fca5a5,#ef4444)!important;
            box-shadow:0 0 16px rgba(239,68,68,.8)!important;
        }
        .robot-btn.dragging .eye::after{width:10px;height:10px;top:4px;left:4px}
        .robot-btn.dragging .mouth{
            width:32px!important;height:18px!important;background:transparent!important;
            border:3px solid #ef4444!important;border-radius:50%!important;
            animation:dragMouth .2s ease infinite!important;
            box-shadow:0 0 10px rgba(239,68,68,.5)!important;

        @keyframes dragMouth{0%,100%{transform:scaleY(1) scaleX(1)}50%{transform:scaleY(1.3) scaleX(.8)}}
        .robot-btn.dragging .arm-l{transform:rotate(-40deg)!important;animation:none!important}
        .robot-btn.dragging .arm-r{transform:rotate(40deg)!important;animation:none!important}
        .robot-btn.dragging .antenna-ball{
            animation:dragAntenna .3s ease infinite!important;
            background:radial-gradient(circle,#fca5a5,#ef4444)!important;
        }
        @keyframes dragAntenna{0%,100%{box-shadow:0 0 12px rgba(239,68,68,.6)}50%{box-shadow:0 0 24px rgba(239,68,68,1)}}
        .robot-btn.dragging .head,
        .robot-btn.dragging .torso{
            box-shadow:0 0 20px rgba(239,68,68,.4),0 0 40px rgba(168,85,247,.2),0 4px 15px rgba(0,0,0,.1)!important;
        }

        /* ===== ÖLTÖZÉKEK ===== */
        .outfit{position:absolute;z-index:10;pointer-events:none;transition:all .3s}
        .outfit-hat{top:-10px;left:50%;transform:translateX(-50%);font-size:36px}
        .outfit-face{top:40px;left:50%;transform:translateX(-50%);font-size:28px;z-index:11}
        .outfit-neck{top:128px;left:50%;transform:translateX(-50%);font-size:22px}

        /* ===== IDŐJÁRÁS ANIMÁCIÓK ===== */
        .weather-layer{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}

        /* Eső */
        .raindrop{position:absolute;width:2px;background:linear-gradient(to bottom,transparent,rgba(255,255,255,.4));border-radius:0 0 2px 2px;animation:rain var(--d) linear infinite;top:-20px}
        @keyframes rain{0%{transform:translateY(-20px);opacity:0}10%{opacity:1}100%{transform:translateY(100vh);opacity:.3}}

        /* Hó */
        .snowflake{position:absolute;border-radius:50%;background:rgba(255,255,255,.8);animation:snow var(--d) linear infinite;top:-10px}
        @keyframes snow{0%{transform:translateY(-10px) translateX(0) rotate(0deg);opacity:0}10%{opacity:1}100%{transform:translateY(100vh) translateX(var(--sx)) rotate(360deg);opacity:.4}}

        /* Napsugarak */
        .sunray{position:absolute;top:-60px;left:50%;width:3px;background:linear-gradient(to bottom,rgba(255,255,0,.3),transparent);transform-origin:top center;animation:sunray 4s ease-in-out infinite}
        @keyframes sunray{0%,100%{opacity:.2;height:120px}50%{opacity:.5;height:180px}}

        /* Konfetti */
        .cfx{position:fixed;inset:0;pointer-events:none;z-index:99}
        .cf{position:absolute;animation:fly 1.1s ease-out forwards}
        @keyframes fly{0%{opacity:1;transform:translate(0,0) rotate(0deg) scale(1)}100%{opacity:0;transform:translate(var(--x),var(--y)) rotate(var(--r)) scale(0)}}

        /* ===== ONBOARDING ===== */
        .onboarding{position:fixed;top:-50px;left:-50px;right:-50px;bottom:-50px;z-index:200;display:flex;align-items:center;justify-content:center;padding:70px 70px;background:linear-gradient(165deg, #38bdf8 0%, #818cf8 30%, #a855f7 55%, #ec4899 80%, #f97316 100%)}
        .onboarding.hidden{display:none}
        .ob-card{
            width:100%;max-width:360px;
            background:rgba(255,255,255,.12);
            backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
            border:1.5px solid rgba(255,255,255,.25);
            border-radius:28px;padding:40px 28px;
            text-align:center;
            box-shadow:0 20px 60px rgba(0,0,0,.15);
            animation:obIn .5s cubic-bezier(.34,1.56,.64,1);
        }
        @keyframes obIn{0%{opacity:0;transform:scale(.8) translateY(30px)}100%{opacity:1;transform:scale(1) translateY(0)}}
        .ob-card.ob-out{animation:obOut .3s ease forwards}
        @keyframes obOut{0%{opacity:1;transform:scale(1) translateY(0)}100%{opacity:0;transform:scale(.8) translateY(-30px)}}
        .ob-emoji{font-size:52px;display:block;margin-bottom:16px}
        .ob-title{font-size:22px;font-weight:800;color:#fff;margin-bottom:6px;text-shadow:0 2px 8px rgba(0,0,0,.2)}
        .ob-sub{font-size:14px;color:rgba(255,255,255,.7);margin-bottom:24px;font-weight:500;line-height:1.4}
        .ob-input{
            width:100%;padding:14px 18px;
            background:rgba(255,255,255,.15);
            border:1.5px solid rgba(255,255,255,.3);
            border-radius:14px;color:#fff;font-size:16px;font-weight:600;
            outline:none;text-align:center;
            transition:border-color .2s,box-shadow .2s;
            -webkit-appearance:none;
        }
        .ob-input::placeholder{color:rgba(255,255,255,.45);font-weight:500}
        .ob-input:focus{border-color:rgba(255,255,255,.6);box-shadow:0 0 20px rgba(255,255,255,.1)}
        .ob-btn{
            display:block;width:100%;margin-top:18px;padding:14px;
            background:rgba(255,255,255,.2);
            border:1.5px solid rgba(255,255,255,.3);
            border-radius:14px;color:#fff;font-size:16px;font-weight:700;
            cursor:pointer;transition:all .2s;
            -webkit-tap-highlight-color:transparent;

        .ob-btn:active{transform:scale(.97);background:rgba(255,255,255,.3)}

        .ob-dots{display:flex;justify-content:center;gap:8px;margin-top:20px}
        .ob-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.3);transition:all .3s}
        .ob-dot.active{background:#fff;transform:scale(1.2)}
        .ob-skip{margin-top:14px;color:rgba(255,255,255,.5);font-size:13px;font-weight:500;background:none;border:none;cursor:pointer;text-decoration:underline}
    </style>
</head>
<body>
    <!-- Onboarding -->
    <div class="onboarding hidden" id="onboarding">
        <div class="ob-card" id="obCard">
            <span class="ob-emoji" id="obEmoji">🤖</span>
            <div class="ob-title" id="obTitle">Szia! Én vagyok DailyBot!</div>
            <div class="ob-sub" id="obSub">Minden nap küldök neked egy motivációs üzenetet. De először ismerkedjünk meg!</div>
            <input class="ob-input" id="obInput" type="text" placeholder="A neved..." autocomplete="off" style="display:none">
            <button class="ob-btn" id="obBtn">Kezdjük! 🚀</button>
            <div class="ob-dots">
                <span class="ob-dot active" id="obD0"></span>

            ob.classList.remove('hidden');

            // Onboarding háttér napszak szerint
            const _h=new Date().getHours();
            let _bg;

            else if(_h>=8&&_h<17) _bg='linear-gradient(165deg,#38bdf8 0%,#818cf8 30%,#a855f7 55%,#ec4899 80%,#f97316 100%)';

            ob.style.background=_bg;

            const steps=[
                {emoji:'👋',title:'Mi a keresztneved?',sub:'Csak az utóneved írd be, hogy személyesen köszönthesselek!',placeholder:'Keresztneved...',type:'text',key:'nu_name'},
                {emoji:'📧',title:'Mi az email címed?',sub:'Ha később értesítéseket szeretnél kapni.',placeholder:'Email címed...',type:'email',key:'nu_email'},
                {emoji:'🎂',title:'Hány éves vagy?',sub:'Hogy a korodhoz illő üzeneteket kapj!',placeholder:'Életkorod...',type:'number',key:'nu_age'},
                {emoji:'📍',title:'Hol laksz?',sub:'Hogy helyi időjárást is mutathassak!',placeholder:'Város neve...',type:'text',key:'nu_city'}
            ];

            let step=-1; // -1 = intro képernyő
            const card=document.getElementById('obCard');
            const emoji=document.getElementById('obEmoji');
            const title=document.getElementById('obTitle');
            const sub=document.getElementById('obSub');
            const input=document.getElementById('obInput');
            const btn=document.getElementById('obBtn');

            function updateDots(){
                for(let i=0;i<4;i++){
                    document.getElementById('obD'+i).classList.toggle('active',i<=step);
                }
            }

            function showStep(){
                const s=steps[step];
                card.classList.remove('ob-out');
                card.style.animation='none';
                card.offsetHeight;
                card.style.animation='obIn .5s cubic-bezier(.34,1.56,.64,1)';
                emoji.textContent=s.emoji;
                title.textContent=s.title;
                sub.textContent=s.sub;
                input.style.display='block';
                input.type=s.type;
                input.placeholder=s.placeholder;
                input.value='';
                input.inputMode=s.type==='number'?'numeric':'text';
                btn.textContent=step<3?'Tovább ➜':'Kész! ✨';
                btn.disabled=true;
                updateDots();
                setTimeout(()=>input.focus(),400);
            }

            btn.addEventListener('click',function(){
                if(step===-1){
                    // Intro → első lépés
                    step=0;
                    card.classList.add('ob-out');
                    setTimeout(()=>showStep(),300);
                    return;
                }
                const val=input.value.trim();
                if(!val)return;
                localStorage.setItem(steps[step].key,val);
                if(step<3){
                    card.classList.add('ob-out');
                    setTimeout(()=>{step++;showStep()},300);
                } else {
                    localStorage.setItem('nu_reg','1');
                    card.classList.add('ob-out');
                    setTimeout(()=>{
                        ob.classList.add('hidden');
                        app.style.display='';
                    },300);
                }
            });

            input.addEventListener('input',()=>{
                // Név mezőnél szóköz tiltása (csak utónév)
                if(step===0) input.value=input.value.replace(/\s/g,'');
                btn.disabled=!input.value.trim();
            });
            input.addEventListener('keydown',e=>{
                if(e.key==='Enter'&&input.value.trim()) btn.click();
            });
        })();

                document.body.style.backgroundAttachment='fixed';

            // Húsvét kiszámítása (Gauss-algoritmus)
            function easter(y){const a=y%19,b=Math.floor(y/100),c=y%100,dd=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-dd-g+15)%30,i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451),mo=Math.floor((h+l-7*m+114)/31),da=(h+l-7*m+114)%31+1;return{m:mo,d:da}}
            const easterDate=easter(d.getFullYear());
            const isEaster=(month+1===easterDate.m&&day>=easterDate.d-3&&day<=easterDate.d+1);

                const lon=pos.coords.longitude.toFixed(2);
                fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`)

                    const code=data.current_weather.weathercode;
                    const wl=document.getElementById('weatherLayer');
                    // WMO kódok: 0-1 derült, 2-3 felhős, 51-67 eső, 71-77 hó, 95-99 vihar

                        }

            {t:"A legbölcsebb döntés néha az, hogy vársz.",e:"🧘"},
            {t:"Ami most fáj, egyszer majd értelmet nyer. Vagy nem — és az is rendben van.",e:"🌧️"},
            {t:"A világ nem igazságos. De a szép dolgok ettől még léteznek.",e:"🌈"},
            {t:"Nem kell mindent kontrollálnod. Néha az elengedés a válasz.",e:"🎈"},
            {t:"A legfontosabb leckéket senki nem tanítja. Azokat éled.",e:"📖"},
            {t:"Az igazi tudás ott kezdődik, ahol beismered, mit nem tudsz.",e:"🔑"},
            {t:"A legnagyobb ajándék, amit az idő ad: távlat.",e:"🏔️"},
            {t:"Nem az a kérdés, mi történt veled. Hanem mit kezdesz vele.",e:"🧩"},
            {t:"A boldogság nem állapot. Inkább pillanatok sorozata.",e:"✨"},
            {t:"Ami elmúlt, megtanított. Ami jön, felkészít. Ami most van: az a tied.",e:"🎁"},
            {t:"Nem kell minden ajtón bemenned. Néha a zárt ajtó is válasz.",e:"🚪"},
            {t:"A változás ijesztő. De a változatlanság néha még ijesztőbb.",e:"🔄"},
            {t:"Az ember akkor a legbölcsebb, amikor rájön, mennyire keveset tud.",e:"🌿"},
            {t:"A legnagyobb luxus nem a pénz. Hanem a belső béke.",e:"☮️"},
            {t:"Néha az út fontosabb, mint az úticél. Nézz körül.",e:"🛤️"},
            {t:"A legszebb igazságokat nem bizonyítani kell. Érezni.",e:"💎"},
            {t:"Amit ma fontosnak tartasz, lehet, hogy egy év múlva elfelejted. Gondolkodj ezen.",e:"🔮"},
            {t:"A kudarc nem ellentéte a sikernek. Hanem része.",e:"🧱"},
            {t:"Az élet nem arról szól, hogy mindent megkapj. Hanem hogy megtanuld, mi kell valóban.",e:"🍃"},
            {t:"Nem az erős ember az, aki sosem sír. Hanem aki sírás után is felkel.",e:"🌅"},
            {t:"A legjobb döntéseket néha a szíved hozza, nem az eszed.",e:"❤️"},
            {t:"Vannak dolgok, amiket nem kell megoldani. Elég, ha elfogadod.",e:"🌊"},
            {t:"A legmélyebb nyugalom onnan jön, ha abbahagyod a harcot önmagaddal.",e:"🧘"},
            {t:"Nem kell mindig tanulságnak lennie. Néha a dolgok egyszerűen megtörténnek.",e:"🍂"},
            {t:"Az igazi gazdagság: ha van időd azokra, akiket szeretsz.",e:"⏰"},
            {t:"A legszebb napok általában váratlanul jönnek.",e:"🌸"},
            {t:"Nem kell megváltoztatnod a világot. Elég, ha nem hagyod, hogy a világ megváltoztasson.",e:"🌍"},
            {t:"A bölcsesség nem az évekkel jön. Hanem azzal, hogy figyelsz.",e:"🦉"},
            // --- 91–120: Kitartás & Türelem ---
            {t:"Nem kell gyorsan menned. Elég, ha nem állsz meg.",e:"🐢"},
            {t:"A legtöbb csoda csendben történik. A tied is úton van.",e:"🌱"},
            {t:"Nem az a kérdés, meddig tart. Hanem hogy kitartasz-e.",e:"🪨"},
            {t:"A nehéz napoknak is van feladata. Általában a legfontosabb.",e:"⛈️"},
            {t:"Nem kell látni a célvonalat ahhoz, hogy tovább menj.",e:"🌫️"},
            {t:"A víz nem azért erős, mert kemény. Hanem mert nem áll meg.",e:"🌊"},
            {t:"A legsötétebb pillanat közvetlenül hajnal előtt van.",e:"🌄"},
            {t:"Nem kell hinnünk a végében ahhoz, hogy elkezdjük.",e:"🪜"},
            {t:"Vannak idők, amikor a kitartás az egyetlen stratégia. És az elég.",e:"🔥"},
            {t:"A fa nem azért erős, mert soha nem hajlott meg. Hanem mert mindig visszaegyenesedett.",e:"🌳"},
            {t:"Nem a sebességed számít. Hanem az irányod.",e:"🧭"},
            {t:"A legtöbb sikertörténet ott kezdődik, ahol valaki nem adta fel.",e:"📖"},
            {t:"Néha a legbátrabb lépés: az a következő. Bármelyik következő.",e:"👟"},
            {t:"Az erő nem abban van, hogy sosem fáradsz el. Hanem hogy fáradtan is mész tovább.",e:"🏔️"},
            {t:"Nem kell hegyeket mozgatnod. Elég, ha a sajátodat megmászod.",e:"⛰️"},
            {t:"A türelem nem tétlenség. Hanem csendes erő.",e:"🎋"},
            {t:"Vannak napok, amik nem az elérésről szólnak. Hanem a túlélésről. És az is győzelem.",e:"🏅"},
            {t:"A bambusz évekig a föld alatt nő. Te sem látod mindig a haladást. De az ott van.",e:"🎋"},
            {t:"Nem kell mindent egyszerre megoldanod. Egy nap, egy lépés.",e:"🪜"},
            {t:"A leghosszabb utak is egyetlen lépéssel kezdődnek.",e:"🛤️"},
            {t:"Vannak viharok, amik nem elpusztítani jönnek. Hanem megtisztítani.",e:"⛈️"},
            {t:"Nem az a kérdés, hányszor estél el. Hanem hogy most felállsz-e.",e:"🌅"},
            {t:"A sötétben is nő a vetés. Akkor is, ha nem látod.",e:"🌾"},
            {t:"Néha az a haladás, hogy nem lépsz hátra.",e:"🪵"},
            {t:"A pillangó is a sötétben alakul át. A te változásod is dolgozik.",e:"🦋"},
            {t:"A kitartás nem hangos. Csendes, türelmes, és hatalmas.",e:"💎"},
            {t:"Nem kell erősnek érezned magad ahhoz, hogy erős legyél.",e:"🛡️"},
            {t:"A holnap csak azért létezik, mert a ma is lehetséges volt.",e:"🌙"},
            {t:"Ha most nehéz, az azt jelenti, hogy valami változik. És a változás fáj, mielőtt gyógyít.",e:"🩵"},
            {t:"Nem kell hinned magadban minden percben. Elég, ha nem adod fel.",e:"💫"},
            // --- 121–150: Nyugalom & Jelenlét ---
            {t:"Nem kell sehova siess. A pillanat itt van, vár rád.",e:"🍃"},
            {t:"A csend nem a magány hangja. Hanem a béke nyelve.",e:"🤫"},
            {t:"Nem kell kitöltened minden percet. Az üres idő is érték.",e:"☁️"},
            {t:"A legmélyebb béke ott kezdődik, ahol abbahagyod az összehasonlítást.",e:"🧘"},
            {t:"Egy mély levegő néha többet ér, mint ezer szó.",e:"🌬️"},
            {t:"Nem kell megoldanod semmit most. Csak lélegezz.",e:"🫧"},
            {t:"A lassúság nem lustaság. Hanem odafigyelés.",e:"🐌"},
            {t:"Vannak pillanatok, amiket csak azzal értékelsz igazán, hogy jelen vagy bennük.",e:"☀️"},
            {t:"A reggeli csend a nap legtisztább része. Hallgasd meg.",e:"🌅"},
            {t:"Nem az a fontos, mit csinálsz. Hanem hogy milyen figyelemmel csinálod.",e:"🔍"},
            {t:"A belső csend nem üres. Hanem tele van válaszokkal.",e:"🌊"},
            {t:"Nem kell minden gondolatodat komolyan venned. A legtöbb csak átutazó.",e:"🚂"},
            {t:"A legjobb napok általában azok, amikor nem terveztél semmit.",e:"🌸"},
            {t:"Egy csésze tea és egy ablak — néha ennyi a gyógyulás.",e:"🫖"},
            {t:"Nem kell megfutamod az élet elől. Elég, ha megállsz benne.",e:"🧎"},
            {t:"A hold nem siet. A folyó nem siet. Te sem kell.",e:"🌙"},
            {t:"A tested jeleket küld. Hallgasd meg, mielőtt kiabálnia kell.",e:"🫁"},
            {t:"Nem kell minden este megoldanod a holnapot. Csak fektesd le a mai napot.",e:"🛌"},
            {t:"Az igazi pihenés nem az, amikor nem csinálsz semmit. Hanem amikor nem aggódsz semmin.",e:"😌"},
            {t:"A leghalkabb este néha a leggazdagabb.",e:"🌠"},
            {t:"Vannak pillanatok, amikor a legjobb döntés: elengedni a kontrollt.",e:"🎈"},
            {t:"A virágok nem gondolkodnak azon, mikor nyíljanak. Egyszerűen nyílnak.",e:"🌷"},
            {t:"Nem kell értelmet találnod mindenben. Néha elég megélni.",e:"🌿"},
            {t:"A jelen pillanat az egyetlen, amiben valóban létezel.",e:"💫"},
            {t:"Az ég akkor is ott van, ha felhős. A belső békéd is.",e:"⛅"},
            {t:"Nem kell mindig termelned. Létezni is elég.",e:"🍵"},
            {t:"A legszebb gondolatok csendben születnek.",e:"🕊️"},
            {t:"Nem az a kérdés, mi vár rád holnap. Hanem hogy ma békében vagy-e.",e:"🌙"},
            {t:"A szíved ritmusát nem kell irányítanod. Csak hallgatnod.",e:"❤️"},
            {t:"Az igazi szabadság: elfogadni, hogy most is elég ez a pillanat.",e:"🍃"},
            // --- 151–180: Könnyedség & Mosoly ---
            {t:"Néha a legjobb terv: nincs terv. Csak egy mosoly és meglátjuk.",e:"😊"},
            {t:"Az élet túl rövid ahhoz, hogy komolyan vedd a komoly dolgokat.",e:"🎈"},
            {t:"A gyerekek azért boldogok, mert nem gondolkodnak azon, hogyan legyenek boldogok.",e:"🧒"},
            {t:"Nem kell mindent kielemezned. Néha a dolgok egyszerűen szépek.",e:"🌺"},
            {t:"A legjobb napok általában egy apró döntéssel kezdődnek: ma jól leszek.",e:"☀️"},
            {t:"Az öröm nem a nagy pillanatokban rejtőzik. Hanem a kis csendekben.",e:"🫧"},
            {t:"Néha a legokosabb dolog: hülyeséget csinálni.",e:"🤭"},
            {t:"A tökéletesség unalmas. A valódi élet kuszább — és épp attól szép.",e:"🎨"},
            {t:"A legjobb nevetések azok, amiknél elfelejted, miért nevetsz.",e:"😂"},
            {t:"Nem kell minden nap produktívnak lenned. Létezni is elfoglaltság.",e:"🐱"},
            {t:"A legjobb gondolatok sétálás közben jönnek. Próbáld ki.",e:"🚶"},
            {t:"A macskák tudják a titkot: a napfolt a legjobb hely.",e:"🐈"},
            {t:"Nem kell mindent megoldani ma. A világ holnap is itt lesz.",e:"🌍"},
            {t:"A kávé nem oldja meg a problémákat. De segít elviselni, amíg megoldódnak.",e:"☕"},
            {t:"Az eső nem rossz idő. Csak más fajta szép.",e:"🌧️"},
            {t:"Néha a legjobb válasz egy vállrándítás és egy mosoly.",e:"🤷"},
            {t:"A boldogság nem úticél. Inkább az a mód, ahogy sétálsz.",e:"🛤️"},
            {t:"Nem kell mindenre választ adnod. A kérdőjel is szép írásjel.",e:"❓"},
            {t:"A mai nap pontosan egyszer történik meg. Érdemes észrevenni.",e:"✨"},
            {t:"Felejtsd el a tökéletes napot. Csinálj egy valódit.",e:"🌻"},
            {t:"A felhők mindig mozgásban vannak. Az érzéseid is.",e:"☁️"},
            {t:"Nem kell oknak lenni a mosolyra. Néha a mosoly maga az ok.",e:"😊"},
            {t:"A legjobb kalandok a terv és a spontaneitás között élnek.",e:"🗺️"},
            {t:"A teknős eljut mindenhová. Csak kicsit lassabban.",e:"🐢"},
            {t:"Nem kell megváltanod a világot. Elég, ha ma mosollyal találkozol.",e:"🌸"},
            {t:"A legjobb pillanatok nem tervezhetők. Csak fogadhatók.",e:"🎁"},
            {t:"Az élet néha zűrös. De a zűr is tud szép lenni.",e:"🌪️"},
            {t:"Nem kell mindent értened. Néha elég, ha élvezed.",e:"🎶"},
            {t:"A boldogság néha egyetlen mondatban elfér. Mint ez.",e:"💛"},
            {t:"Ha ma nem sikerült semmi — az is egy történet, amit mesélhetsz majd nevetve.",e:"😌"},
            // --- 181–210: Alkotás & Figyelem ---
            {t:"A legszebb dolgokat nem a szemeddel látod. Hanem azzal, ahogy figyelsz.",e:"🔎"},
            {t:"Minden nap alkothatsz valamit. Akár egy gondolatot, ami szép.",e:"✍️"},
            {t:"A csend az a vászon, amire a nap rajzol.",e:"🖼️"},
            {t:"Nem kell művésznek lenned ahhoz, hogy szépet alkoss.",e:"🎨"},
            {t:"A legjobb ötletek ott születnek, ahol a figyelem és a szabadság találkozik.",e:"💡"},
            {t:"Vannak pillanatok, amiket nem lefotózni kell. Hanem érezni.",e:"📷"},
            {t:"A kíváncsiság a lélek oxigénje.",e:"🧐"},
            {t:"Nem kell újat kitalálnod. Néha elég máshogy nézni a régit.",e:"🔄"},
            {t:"A legszebb zene néha a csend a két hang között.",e:"🎵"},
            {t:"Az alkotás nem a végeredményről szól. Hanem az útról, ami közben történik.",e:"🛤️"},
            {t:"A világ tele van részletekkel, amiket csak az lát, aki lassan jár.",e:"🌿"},
            {t:"Nem kell nagy dolgot csinálnod. A kicsi is lehet mély.",e:"🐚"},
            {t:"A legjobb gondolatok a séták mellékterméke.",e:"🚶"},
            {t:"Az ihlet nem jön, ha hívod. De eljön, ha figyelmes vagy.",e:"🦋"},
            {t:"A kreativitás nem tehetség. Hanem bátorság.",e:"🌈"},
            {t:"Vannak könyvek, amik azért szépek, mert egy mondatukon megállsz.",e:"📖"},
            {t:"Az igazi művészet nem tökéletes. Hanem őszinte.",e:"🎭"},
            {t:"Nem kell minden gondolatot megosztanod. Vannak, amik csak a tieid.",e:"💭"},
            {t:"A reggeli fény mindig más. Ha figyeled, minden nap új.",e:"🌅"},
            {t:"Néha a legjobb dolog, amit tehetsz: figyelni, ahogy minden változik.",e:"🍂"},
            {t:"Az ember akkor ír igazán, amikor nem az olvasóra gondol.",e:"✏️"},
            {t:"A szépség ott van, ahol keresd. De ott is, ahol nem.",e:"🌸"},
            {t:"Nem kell nagy vászon ahhoz, hogy szépet alkoss. Egy gondolat is elég.",e:"🧠"},
            {t:"A legrégibb történetek azért szépek, mert valaki egyszer figyelt.",e:"🏛️"},
            {t:"Nem az számít, mit látsz. Hanem amit észreveszel.",e:"👁️"},
            {t:"A kedvenc dalod azért kedvenc, mert egyszer valaki pontosan azt érezte, amit te.",e:"🎧"},
            {t:"Az igazi figyelem ajándék. A legritkább, amit adhatsz.",e:"🎁"},
            {t:"Nem kell megörökítened mindent. Vannak pillanatok, amik a memóriádban a legszebbek.",e:"🧡"},
            {t:"A teremtés nem a semmiből jön. Hanem a csendből.",e:"🌙"},
            {t:"Az igazi szépség mindig csendes. Mint a hajnali harmat.",e:"🌅"},
            // --- 211–240: Természet & Csoda ---
            {t:"A természet nem siet. Mégis minden elkészül.",e:"🌳"},
            {t:"Nem kell messzire menned a szépért. Nézz ki az ablakon.",e:"🪟"},
            {t:"A tenger nem gondolkodik a hullámokon. Csak hullámzik.",e:"🌊"},
            {t:"Vannak helyek, ahol a csend hangosabb, mint bármelyik város.",e:"🏞️"},
            {t:"A virág nem kérdezi, ki nézi. Egyszerűen nyílik.",e:"🌷"},
            {t:"Az eső nem szomorúság. Hanem a föld módja, hogy újjászülessen.",e:"🌧️"},
            {t:"A legszebb dolgok a természetben nem szimmetrikusak. Ettől szépek.",e:"🍂"},
            {t:"A szél nem lát, mégis mindent megérint.",e:"💨"},
            {t:"Egyetlen fa több bölcsességet hordoz, mint száz könyv.",e:"🌲"},
            {t:"A hajnal mindig eljön. Akkor is, ha az éjszaka végtelen volt.",e:"🌄"},
            {t:"Nem kell értened a természetet. Elég, ha részt veszel benne.",e:"🌿"},
            {t:"A felhők sosem azonosak. Minden pillanat egyszeri az égen.",e:"☁️"},
            {t:"A föld csendben forog. A legnagyobb erők nem hangosak.",e:"🌍"},
            {t:"Vannak napfelkelték, amikről senki sem tud. Ettől nem kevésbé szépek.",e:"🌅"},
            {t:"Az ősz nem a vége valaminek. Hanem az elengedés művészete.",e:"🍁"},
            {t:"A csillagok nem versenyeznek. Mindegyik a maga fényével világít.",e:"⭐"},
            {t:"A víz mindig megtalálja az utat. Még a sziklán keresztül is.",e:"💧"},
            {t:"A hold nem fél a sötétségtől. Azzal együtt szép.",e:"🌙"},
            {t:"A legmélyebb gyökerek láthatatlanok. Mint a legigazabb erő.",e:"🌱"},
            {t:"A madarak nem azért énekelnek, mert válaszuk van. Hanem mert daluk van.",e:"🐦"},
            {t:"A hó csendben érkezik. A legnagyobb változások is.",e:"❄️"},
            {t:"Nem az a csoda, hogy a nap felkel. Hanem hogy minden nap újra.",e:"☀️"},
            {t:"A hegyek nem siettek, hogy ilyen magasak legyenek.",e:"⛰️"},
            {t:"A tavasz nem kéri az engedélyed. Egyszerűen jön.",e:"🌺"},
            {t:"A folyó nem fél az ismeretlentől. Egyszerűen folyik tovább.",e:"🏞️"},
            {t:"Vannak esték, amikor az ég önmagáért fest. Csak nézned kell.",e:"🌇"},
            {t:"A természet nyelve csend. De mindent elmond.",e:"🤫"},
            {t:"A legkisebb mag is tudja, mivé akar lenni. Te is tudod.",e:"🌰"},
            {t:"Az éjszaka nem az ellentéte a nappalnak. Hanem a kiegészítője.",e:"🌌"},
            {t:"A legszebb tájak azok, amiket gyalog érsz el.",e:"🥾"},
            // --- 241–270: Érzések & Mélység ---
            {t:"Az érzések nem ellenségeid. Hanem tájékozódási pontjaid.",e:"🧭"},
            {t:"Nem kell minden könnyet megmagyaráznod. Van, ami egyszerűen fáj.",e:"💧"},
            {t:"A boldogság néha olyan halk, hogy csak csendben hallod.",e:"🌸"},
            {t:"Nem kell félned attól, amit érzel. Az érzés azt jelenti: élsz.",e:"💗"},
            {t:"A szomorúság nem a boldogság ellentéte. Hanem a testvére.",e:"🌧️"},
            {t:"Az ember néha úgy gyógyul, hogy először összetörik.",e:"🫧"},
            {t:"Nem kell mindig erősnek lenned. A puhaság is tartóerő.",e:"🧸"},
            {t:"A régi fájdalmak nem azért térnek vissza, mert nem gyógyultál. Hanem mert mélyülsz.",e:"🌊"},
            {t:"Az igazi öröm nem hangos. Inkább az a meleg érzés, ami belülről jön.",e:"☀️"},
            {t:"Nem kell ok a könnyekhez. És nem kell ok a mosolyhoz sem.",e:"🌈"},
            {t:"A sebezhetőség nem gyengeség. Hanem a kapcsolódás nyelve.",e:"🤝"},
            {t:"Vannak napok, amik csak a gyászolásra valók. Azok is fontosak.",e:"🕯️"},
            {t:"A legmélyebb érzések nem szavakban élnek. Hanem a csendben közöttük.",e:"💭"},
            {t:"Az öröm nem véletlenül jön. Hanem akkor, amikor megengedsz magadnak.",e:"🌻"},
            {t:"Nem kell elrejtened, amit érzel. Az érzés a tied, és jogos.",e:"🤍"},
            {t:"A szív nem logikus. Ezért tud olyan gyönyörűen érezni.",e:"❤️"},
            {t:"Vannak éjszakák, amikben a sötétség tanít. Hallgasd meg.",e:"🌙"},
            {t:"Az igazi erő nem az érzések elnyomása. Hanem az átélésük.",e:"🌊"},
            {t:"A hála nem üres szó. Hanem az a pillanat, amikor észreveszed: ez is szép.",e:"🙏"},
            {t:"Nem kell megmagyaráznod senkinek, mit érzel. Magadnak sem mindig.",e:"🍃"},
            {t:"A belső hang néha suttog. Érdemes lehalkítani a világot, hogy halld.",e:"🤫"},
            {t:"Az érzések olyanok, mint az évszakok. Jönnek, maradnak, mennek. Mind kell.",e:"🍂"},
            {t:"Nem kell választanod az erő és a lágyság között. Lehetsz mindkettő.",e:"🦋"},
            {t:"A legigazabb pillanatok azok, amikor nem próbálsz semmit mutatni.",e:"🪞"},
            {t:"A fájdalom nem az ellensége az életnek. Hanem a bizonyítéka.",e:"💎"},
            {t:"Az ember akkor a legszebb, amikor nem tudja, hogy figyelik.",e:"🌸"},
