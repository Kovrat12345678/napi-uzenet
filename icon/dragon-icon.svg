<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#042f2e"/>
      <stop offset="30%" style="stop-color:#064e3b"/>
      <stop offset="60%" style="stop-color:#0c4a6e"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c4a6e"/>
      <stop offset="50%" style="stop-color:#0369a1"/>
      <stop offset="100%" style="stop-color:#0284c7"/>
    </linearGradient>
    <linearGradient id="wing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="60%" style="stop-color:#0284c7"/>
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:0.3"/>
    </linearGradient>
    <radialGradient id="eye" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#bef264"/>
      <stop offset="60%" style="stop-color:#84cc16"/>
      <stop offset="100%" style="stop-color:#65a30d"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feFlood flood-color="#0ea5e9" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="eyeGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feFlood flood-color="#84cc16" flood-opacity="0.8" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Háttér -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- Csillagok -->
  <circle cx="80" cy="80" r="2" fill="#7dd3fc" opacity="0.5"/>
  <circle cx="420" cy="60" r="1.5" fill="#7dd3fc" opacity="0.4"/>
  <circle cx="50" cy="400" r="2" fill="#7dd3fc" opacity="0.3"/>
  <circle cx="450" cy="420" r="1.5" fill="#7dd3fc" opacity="0.5"/>
  <circle cx="380" cy="130" r="1" fill="#7dd3fc" opacity="0.6"/>

  <g filter="url(#shadow)">
    <!-- Bal szárny -->
    <g filter="url(#glow)">
      <path d="M100,200 L60,120 L80,180 L40,100 L90,170 L30,70 L110,190 L160,240" fill="url(#wing)" opacity="0.8"/>
      <path d="M100,200 L70,250 L90,230 L60,300 L110,260 L80,330 L130,280 L160,240" fill="url(#wing)" opacity="0.6"/>
    </g>

    <!-- Jobb szárny -->
    <g filter="url(#glow)">
      <path d="M412,200 L452,120 L432,180 L472,100 L422,170 L482,70 L402,190 L352,240" fill="url(#wing)" opacity="0.8"/>
      <path d="M412,200 L442,250 L422,230 L452,300 L402,260 L432,330 L382,280 L352,240" fill="url(#wing)" opacity="0.6"/>
    </g>

    <!-- Farok -->
    <path d="M256,400 Q200,430 150,420 Q100,415 80,440 L90,430 Q110,410 160,415 Q210,420 256,395" fill="url(#body)" stroke="#0ea5e9" stroke-width="1" opacity="0.9"/>

    <!-- Test -->
    <ellipse cx="256" cy="310" rx="95" ry="85" fill="url(#body)" stroke="#38bdf8" stroke-width="2" opacity="0.95"/>

    <!-- Mellkas minta -->
    <ellipse cx="256" cy="320" rx="50" ry="55" fill="#042f2e" stroke="#38bdf8" stroke-width="1.5" opacity="0.5"/>
    <!-- Mellkas LED-ek -->
    <circle cx="240" cy="340" r="4" fill="#7dd3fc" opacity="0.8"/>
    <circle cx="256" cy="345" r="4" fill="#38bdf8" opacity="0.9"/>
    <circle cx="272" cy="340" r="4" fill="#7dd3fc" opacity="0.8"/>

    <!-- Szív -->
    <text x="256" y="320" text-anchor="middle" font-size="28" opacity="0.9">💙</text>

    <!-- Nyak -->
    <rect x="240" y="228" width="32" height="24" rx="6" fill="#075985" stroke="#38bdf8" stroke-width="1"/>

    <!-- Fej -->
    <rect x="170" y="120" width="172" height="118" rx="44" fill="url(#body)" stroke="#38bdf8" stroke-width="2.5"/>

    <!-- Taréj -->
    <path d="M210,118 L220,80 L235,115 L250,75 L265,115 L280,80 L295,118" fill="#0ea5e9" stroke="#38bdf8" stroke-width="1.5"/>

    <!-- Szarvak -->
    <path d="M205,135 L170,70 L195,120" fill="#0ea5e9" stroke="#38bdf8" stroke-width="1.5"/>
    <path d="M307,135 L342,70 L317,120" fill="#0ea5e9" stroke="#38bdf8" stroke-width="1.5"/>

    <!-- Arc kijelző -->
    <rect x="195" y="140" width="122" height="78" rx="24" fill="#042f2e" stroke="#38bdf8" stroke-width="1.5" opacity="0.8"/>

    <!-- Szemek -->
    <g filter="url(#eyeGlow)">
      <ellipse cx="228" cy="172" rx="20" ry="12" fill="url(#eye)"/>
      <ellipse cx="284" cy="172" rx="20" ry="12" fill="url(#eye)"/>
    </g>
    <!-- Pupillák — rés -->
    <ellipse cx="228" cy="172" rx="3" ry="10" fill="#1a2e05"/>
    <ellipse cx="284" cy="172" rx="3" ry="10" fill="#1a2e05"/>

    <!-- Pofa -->
    <ellipse cx="256" cy="236" rx="34" ry="14" fill="#075985" stroke="#38bdf8" stroke-width="1"/>

    <!-- Száj -->
    <path d="M240,230 Q256,240 272,230" stroke="#0ea5e9" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <!-- Hegyes fülek -->
    <polygon points="165,175 140,130 165,155" fill="#0ea5e9" stroke="#38bdf8" stroke-width="1.5"/>
    <polygon points="347,175 372,130 347,155" fill="#0ea5e9" stroke="#38bdf8" stroke-width="1.5"/>

    <!-- Vállak -->
    <circle cx="172" cy="268" r="14" fill="#0369a1" stroke="#38bdf8" stroke-width="1.5"/>
    <circle cx="340" cy="268" r="14" fill="#0369a1" stroke="#38bdf8" stroke-width="1.5"/>

    <!-- Karok -->
    <rect x="118" y="260" width="30" height="70" rx="15" fill="url(#body)" stroke="#38bdf8" stroke-width="1.5" transform="rotate(-15,133,260)"/>
    <rect x="364" y="260" width="30" height="70" rx="15" fill="url(#body)" stroke="#38bdf8" stroke-width="1.5" transform="rotate(15,379,260)"/>

    <!-- Lábak -->
    <rect x="210" y="385" width="36" height="50" rx="12" fill="#075985" stroke="#38bdf8" stroke-width="1.5"/>
    <rect x="266" y="385" width="36" height="50" rx="12" fill="#075985" stroke="#38bdf8" stroke-width="1.5"/>
    <!-- Talpak -->
    <rect x="202" y="428" width="50" height="16" rx="8" fill="#0c4a6e" stroke="#38bdf8" stroke-width="1"/>
    <rect x="260" y="428" width="50" height="16" rx="8" fill="#0c4a6e" stroke="#38bdf8" stroke-width="1"/>
  </g>
</svg>
