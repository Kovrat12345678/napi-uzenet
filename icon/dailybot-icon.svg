<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="35%" style="stop-color:#818cf8"/>
      <stop offset="60%" style="stop-color:#a855f7"/>
      <stop offset="85%" style="stop-color:#ec4899"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </linearGradient>
    <linearGradient id="robot" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#c7d2fe"/>
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#020617"/>
    </linearGradient>
    <linearGradient id="bubble" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.25)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.1)"/>
    </linearGradient>
    <radialGradient id="eyeL" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="30%" style="stop-color:#67e8f9"/>
      <stop offset="70%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </radialGradient>
    <radialGradient id="eyeR" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="30%" style="stop-color:#67e8f9"/>
      <stop offset="70%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </radialGradient>
    <radialGradient id="antennaGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fef08a"/>
      <stop offset="50%" style="stop-color:#facc15"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </radialGradient>
    <filter id="neonBlue" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#22d3ee" flood-opacity="0.9" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="neonYellow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#ffffff" flood-opacity="0.3" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="neonPink" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feFlood flood-color="#f472b6" flood-opacity="0.7" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigShadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="6" stdDeviation="16" flood-color="#7c3aed" flood-opacity="0.5"/>
    </filter>
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#ffffff" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Sötét háttér -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- Neon háttérkör -->
  <circle cx="256" cy="240" r="200" fill="none" stroke="#7c3aed" stroke-width="2" opacity="0.15"/>
  <circle cx="256" cy="240" r="170" fill="none" stroke="#a855f7" stroke-width="1.5" opacity="0.1"/>
  <circle cx="256" cy="240" r="230" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.08"/>

  <!-- Csillagok - nagyobbak, fényesebbek -->
  <circle cx="75" cy="80" r="3" fill="#fde68a" opacity="0.9"/>
  <circle cx="75" cy="80" r="8" fill="#fde68a" opacity="0.15"/>
  <circle cx="430" cy="60" r="2.5" fill="#67e8f9" opacity="0.9"/>
  <circle cx="430" cy="60" r="7" fill="#67e8f9" opacity="0.15"/>
  <circle cx="55" cy="350" r="2" fill="#f472b6" opacity="0.8"/>
  <circle cx="55" cy="350" r="6" fill="#f472b6" opacity="0.12"/>
  <circle cx="450" cy="380" r="3" fill="#a78bfa" opacity="0.9"/>
  <circle cx="450" cy="380" r="9" fill="#a78bfa" opacity="0.15"/>
  <circle cx="400" cy="150" r="1.5" fill="#fde68a" opacity="0.7"/>
  <circle cx="90" cy="430" r="2" fill="#67e8f9" opacity="0.8"/>
  <circle cx="440" cy="250" r="1.5" fill="#f472b6" opacity="0.6"/>
  <circle cx="70" cy="200" r="2" fill="#a78bfa" opacity="0.7"/>

  <!-- Szövegbuborék - NAGY, fényes -->
  <g filter="url(#neonYellow)">
    <rect x="295" y="32" width="180" height="90" rx="22" ry="22" fill="url(#bubble)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <polygon points="320,122 345,122 305,155" fill="rgba(255,255,255,0.15)"/>
  </g>
  <text x="385" y="72" text-anchor="middle" font-family="-apple-system,system-ui,sans-serif" font-size="18" font-weight="900" fill="#ffffff">Napi</text>
  <text x="385" y="100" text-anchor="middle" font-family="-apple-system,system-ui,sans-serif" font-size="18" font-weight="900" fill="#ffffff">Üzenet! 💛</text>

  <!-- Robot - NAGYOBB, középen -->
  <g filter="url(#bigShadow)">
    <!-- Antenna rúd -->
    <rect x="250" y="100" width="7" height="40" rx="3.5" fill="#94a3b8"/>
    <!-- Antenna gömb - neon -->
    <g filter="url(#neonYellow)">
      <circle cx="253" cy="92" r="16" fill="url(#antennaGlow)"/>
    </g>

    <!-- Fülek - neon accent -->
    <rect x="108" y="195" width="20" height="36" rx="10" fill="#e2e8f0" stroke="#22d3ee" stroke-width="1.5"/>
    <circle cx="118" cy="213" r="5" fill="#22d3ee" opacity="0.8"/>
    <rect x="378" y="195" width="20" height="36" rx="10" fill="#e2e8f0" stroke="#22d3ee" stroke-width="1.5"/>
    <circle cx="388" cy="213" r="5" fill="#22d3ee" opacity="0.8"/>

    <!-- Fej - NAGY -->
    <rect x="126" y="138" width="254" height="140" rx="50" fill="url(#robot)" stroke="#a5b4fc" stroke-width="2"/>

    <!-- Arc kijelző -->
    <rect x="152" y="160" width="202" height="98" rx="32" fill="url(#screen)" stroke="#334155" stroke-width="1"/>

    <!-- Szemek - NAGY, neon glow -->
    <g filter="url(#neonBlue)">
      <circle cx="216" cy="205" r="22" fill="url(#eyeL)"/>
      <circle cx="290" cy="205" r="22" fill="url(#eyeR)"/>
    </g>
    <!-- Szem csillanás -->
    <circle cx="208" cy="196" r="8" fill="rgba(255,255,255,0.85)"/>
    <circle cx="282" cy="196" r="8" fill="rgba(255,255,255,0.85)"/>
    <circle cx="224" cy="214" r="3" fill="rgba(255,255,255,0.4)"/>
    <circle cx="298" cy="214" r="3" fill="rgba(255,255,255,0.4)"/>

    <!-- Mosoly - szélesebb, neon -->
    <g filter="url(#neonBlue)">
      <path d="M222,240 Q253,265 284,240" stroke="#22d3ee" stroke-width="4.5" fill="none" stroke-linecap="round"/>
    </g>

    <!-- Nyak -->
    <rect x="237" y="276" width="32" height="20" rx="5" fill="#cbd5e1"/>

    <!-- Vállak -->
    <circle cx="152" cy="308" r="14" fill="#e2e8f0" stroke="#a5b4fc" stroke-width="1.5"/>
    <circle cx="354" cy="308" r="14" fill="#e2e8f0" stroke="#a5b4fc" stroke-width="1.5"/>

    <!-- Karok - felemelve, integetős póz -->
    <rect x="100" y="280" width="30" height="80" rx="15" fill="url(#robot)" stroke="#a5b4fc" stroke-width="1.5" transform="rotate(-30,115,280)"/>
    <rect x="376" y="280" width="30" height="80" rx="15" fill="url(#robot)" stroke="#a5b4fc" stroke-width="1.5" transform="rotate(30,391,280)"/>
    <!-- Kezek -->
    <circle cx="82" cy="318" r="14" fill="#e2e8f0" stroke="#a5b4fc" stroke-width="1.5"/>
    <circle cx="424" cy="318" r="14" fill="#e2e8f0" stroke="#a5b4fc" stroke-width="1.5"/>

    <!-- Törzs -->
    <rect x="146" y="294" width="214" height="112" rx="28" fill="url(#robot)" stroke="#a5b4fc" stroke-width="2"/>

    <!-- Mellkas panel - neon szegély -->
    <rect x="218" y="312" width="70" height="70" rx="18" fill="url(#screen)" stroke="#22d3ee" stroke-width="2"/>

    <!-- Nagy szív - neon rózsaszín -->
    <g filter="url(#neonPink)">
      <text x="253" y="360" text-anchor="middle" font-size="40">❤️</text>
    </g>

    <!-- LED csík -->
    <g filter="url(#neonBlue)">
      <circle cx="230" cy="376" r="4" fill="#22d3ee"/>
      <circle cx="253" cy="376" r="4" fill="#67e8f9"/>
      <circle cx="276" cy="376" r="4" fill="#22d3ee"/>
    </g>

    <!-- Lábak -->
    <rect x="192" y="404" width="36" height="46" rx="12" fill="#e2e8f0" stroke="#a5b4fc" stroke-width="1.5"/>
    <rect x="280" y="404" width="36" height="46" rx="12" fill="#e2e8f0" stroke="#a5b4fc" stroke-width="1.5"/>
    <!-- Cipők -->
    <rect x="184" y="444" width="50" height="16" rx="8" fill="#94a3b8" stroke="#a5b4fc" stroke-width="1"/>
    <rect x="274" y="444" width="50" height="16" rx="8" fill="#94a3b8" stroke="#a5b4fc" stroke-width="1"/>
  </g>

  <!-- "DailyBot" felirat - NAGY, neon fehér -->
  <g filter="url(#textGlow)">
    <text x="256" y="496" text-anchor="middle" font-family="-apple-system,system-ui,sans-serif" font-size="38" font-weight="900" fill="white" letter-spacing="2">DailyBot</text>
  </g>
</svg>