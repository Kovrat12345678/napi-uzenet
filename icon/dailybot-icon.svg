<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="50%" style="stop-color:#6d28d9"/>
      <stop offset="100%" style="stop-color:#4c1d95"/>
    </linearGradient>
    <linearGradient id="headGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#c7d2fe"/>
    </linearGradient>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f1f5f9"/>
      <stop offset="50%" style="stop-color:#e2e8f0"/>
      <stop offset="100%" style="stop-color:#cbd5e1"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#020617"/>
    </linearGradient>
    <radialGradient id="eyeGrad" cx="40%" cy="40%" r="55%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="35%" style="stop-color:#67e8f9"/>
      <stop offset="75%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </radialGradient>
    <radialGradient id="antennaGrad" cx="35%" cy="35%" r="55%">
      <stop offset="0%" style="stop-color:#fef08a"/>
      <stop offset="50%" style="stop-color:#facc15"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#22d3ee" flood-opacity="0.7" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="yellowGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feFlood flood-color="#facc15" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="pinkGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feFlood flood-color="#f472b6" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="5" stdDeviation="12" flood-color="#4c1d95" flood-opacity="0.5"/>
    </filter>
    <filter id="textShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Hatter -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- Csillagok -->
  <circle cx="72" cy="76" r="3" fill="#fde68a" opacity="0.8"/>
  <circle cx="440" cy="64" r="2.5" fill="#67e8f9" opacity="0.8"/>
  <circle cx="56" cy="320" r="2" fill="#f472b6" opacity="0.6"/>
  <circle cx="456" cy="340" r="2.5" fill="#a78bfa" opacity="0.7"/>
  <circle cx="420" cy="160" r="1.5" fill="#fde68a" opacity="0.5"/>
  <circle cx="88" cy="440" r="2" fill="#67e8f9" opacity="0.5"/>

  <!-- ===== ROBOT - nagy, kozepen ===== -->
  <g filter="url(#shadow)" transform="translate(256,218)">

    <!-- Antenna rud -->
    <rect x="-4" y="-152" width="8" height="44" rx="4" fill="#94a3b8"/>

    <!-- Antenna gomb - sarga neon -->
    <g filter="url(#yellowGlow)">
      <circle cx="0" cy="-162" r="18" fill="url(#antennaGrad)"/>
    </g>

    <!-- Fulek -->
    <rect x="-150" y="-62" width="24" height="42" rx="12" fill="#e2e8f0" stroke="#22d3ee" stroke-width="1.5"/>
    <circle cx="-138" cy="-41" r="6" fill="#22d3ee" opacity="0.7"/>
    <rect x="126" y="-62" width="24" height="42" rx="12" fill="#e2e8f0" stroke="#22d3ee" stroke-width="1.5"/>
    <circle cx="138" cy="-41" r="6" fill="#22d3ee" opacity="0.7"/>

    <!-- Fej -->
    <rect x="-132" y="-110" width="264" height="152" rx="54" fill="url(#headGrad)" stroke="#a5b4fc" stroke-width="2.5"/>

    <!-- Arc kijelzo -->
    <rect x="-106" y="-88" width="212" height="110" rx="36" fill="url(#screenGrad)" stroke="#334155" stroke-width="1.5"/>

    <!-- Szemek - nagy, neon -->
    <g filter="url(#glow)">
      <circle cx="-42" cy="-38" r="28" fill="url(#eyeGrad)"/>
      <circle cx="42" cy="-38" r="28" fill="url(#eyeGrad)"/>
    </g>
    <!-- Szem csillanás -->
    <circle cx="-53" cy="-50" r="10" fill="rgba(255,255,255,0.9)"/>
    <circle cx="31" cy="-50" r="10" fill="rgba(255,255,255,0.9)"/>
    <circle cx="-32" cy="-28" r="4" fill="rgba(255,255,255,0.35)"/>
    <circle cx="52" cy="-28" r="4" fill="rgba(255,255,255,0.35)"/>

    <!-- Mosoly -->
    <g filter="url(#glow)">
      <path d="M-32,0 Q0,30 32,0" stroke="#22d3ee" stroke-width="5" fill="none" stroke-linecap="round"/>
    </g>

    <!-- Nyak -->
    <rect x="-17" y="40" width="34" height="18" rx="5" fill="#cbd5e1"/>

    <!-- Vallak -->
    <circle cx="-112" cy="70" r="16" fill="#e2e8f0" stroke="#a5b4fc" stroke-width="1.5"/>
    <circle cx="112" cy="70" r="16" fill="#e2e8f0" stroke="#a5b4fc" stroke-width="1.5"/>

    <!-- Karok - felemelve, integeto poz -->
    <rect x="-146" y="40" width="32" height="82" rx="16" fill="url(#bodyGrad)" stroke="#a5b4fc" stroke-width="1.5" transform="rotate(-28,-130,40)"/>
    <rect x="114" y="40" width="32" height="82" rx="16" fill="url(#bodyGrad)" stroke="#a5b4fc" stroke-width="1.5" transform="rotate(28,130,40)"/>
    <!-- Kezek -->
    <circle cx="-158" cy="82" r="16" fill="#e2e8f0" stroke="#a5b4fc" stroke-width="1.5"/>
    <circle cx="158" cy="82" r="16" fill="#e2e8f0" stroke="#a5b4fc" stroke-width="1.5"/>

    <!-- Torzs -->
    <rect x="-114" y="56" width="228" height="120" rx="30" fill="url(#bodyGrad)" stroke="#a5b4fc" stroke-width="2.5"/>

    <!-- Mellkas panel -->
    <rect x="-40" y="74" width="80" height="80" rx="22" fill="url(#screenGrad)" stroke="#22d3ee" stroke-width="2"/>

    <!-- Sziv - nagy, neon pink -->
    <g filter="url(#pinkGlow)">
      <text x="0" y="124" text-anchor="middle" font-size="42">❤️</text>
    </g>

    <!-- LED pontok -->
    <g filter="url(#glow)">
      <circle cx="-18" cy="146" r="5" fill="#22d3ee"/>
      <circle cx="0" cy="146" r="5" fill="#67e8f9"/>
      <circle cx="18" cy="146" r="5" fill="#22d3ee"/>
    </g>

    <!-- Labak -->
    <rect x="-64" y="174" width="40" height="50" rx="14" fill="#e2e8f0" stroke="#a5b4fc" stroke-width="1.5"/>
    <rect x="24" y="174" width="40" height="50" rx="14" fill="#e2e8f0" stroke="#a5b4fc" stroke-width="1.5"/>
    <!-- Cipok -->
    <rect x="-72" y="218" width="56" height="18" rx="9" fill="#94a3b8" stroke="#a5b4fc" stroke-width="1"/>
    <rect x="16" y="218" width="56" height="18" rx="9" fill="#94a3b8" stroke="#a5b4fc" stroke-width="1"/>
  </g>

  <!-- "DailyBot" felirat - nagy, vastag -->
  <g filter="url(#textShadow)">
    <text x="256" y="492" text-anchor="middle" font-family="-apple-system,system-ui,'Segoe UI',Roboto,sans-serif" font-size="54" font-weight="900" fill="white" letter-spacing="2">DailyBot</text>
  </g>
</svg>